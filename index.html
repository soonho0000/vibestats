<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibestats — WebR Statistical Analysis</title>
<style>
  :root {
    --bg: #0f1419; --panel: #1a212b; --panel-2: #232c38;
    --line: #2d3744; --line-bright: #3a4757;
    --ink: #e4e9ef; --ink-dim: #8a97a6; --ink-faint: #5d6977;
    --accent: #6f8cff; --accent-dim: #34407a;
    --blue: #5b9dd9; --amber: #d9a45b; --red: #d96b6b; --green: #6bbf7b;
    --mono: 'SF Mono','JetBrains Mono','Menlo','Consolas',monospace;
    --sans: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --font-scale: 1;
    --menubar: #141a22;
    --result-card-bg: linear-gradient(180deg, rgba(35,44,56,.92), rgba(15,20,25,.72));
    --result-card-shadow: inset 0 1px 0 rgba(255,255,255,.03), 0 10px 24px rgba(0,0,0,.16);
    --soft-hover: #28323f;
  }
  body.light {
    --bg: #f6f8fc; --panel: #ffffff; --panel-2: #edf2f8;
    --line: #d5deea; --line-bright: #b8c4d4;
    --ink: #152033; --ink-dim: #536177; --ink-faint: #8994a5;
    --accent: #4f6df5; --accent-dim: #e5eaff;
    --blue: #2f77b4; --amber: #b87524; --red: #c84f4f; --green: #2e8b57;
    --menubar: #ffffff;
    --result-card-bg: linear-gradient(180deg, rgba(255,255,255,.98), rgba(237,242,248,.88));
    --result-card-shadow: inset 0 1px 0 rgba(255,255,255,.8), 0 10px 24px rgba(47,65,90,.10);
    --soft-hover: #e8eef7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: calc(13px * var(--font-scale)); overflow: hidden; }

  #boot { position: fixed; inset: 0; z-index: 200; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; transition: opacity .5s; }
  #boot .mark { font-family: var(--mono); font-size: 26px; letter-spacing: 2px; }
  #boot .mark b { color: var(--accent); } #boot .mark .r { color: var(--blue); }
  #boot .bar { width: 300px; height: 2px; background: var(--line); overflow: hidden; position: relative; }
  #boot .bar i { position: absolute; inset: 0; width: 40%; background: var(--accent); animation: slide 1.1s ease-in-out infinite; }
  @keyframes slide { 0%{left:-40%} 100%{left:100%} }
  #boot .status { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); height: 14px; }

  .menubar { height: 30px; display: flex; align-items: stretch; background: var(--menubar); border-bottom: 1px solid var(--line); font-size: calc(12px * var(--font-scale)); position: relative; z-index: 60; }
  .menu { position: relative; }
  .menu > .mtitle { padding: 0 14px; height: 100%; display: flex; align-items: center; cursor: pointer; color: var(--ink-dim); font-family: var(--mono); }
  .menu > .mtitle:hover, .menu.open > .mtitle { background: var(--panel-2); color: var(--ink); }
  .menu .dropdown { position: absolute; top: 100%; left: 0; min-width: 230px; background: var(--panel); border: 1px solid var(--line-bright); border-radius: 0 0 6px 6px; padding: 4px; box-shadow: 0 8px 24px rgba(0,0,0,.5); }
  .menu .ditem { padding: 8px 12px; border-radius: 4px; cursor: pointer; color: var(--ink); font-family: var(--mono); font-size: 12px; white-space: nowrap; }
  .menu .ditem:hover { background: var(--panel-2); color: var(--accent); }
  .menu .dsep { height: 1px; background: var(--line); margin: 4px 6px; }
  .menubar .spacer { flex: 1; }
  .menubar .right { display: flex; align-items: center; gap: 10px; padding: 0 14px; }
  .menubar .right .logo { font-family: var(--mono); font-weight: 600; letter-spacing: 1px; }
  .menubar .right .logo b { color: var(--accent); } .menubar .right .logo .r { color: var(--blue); }
  .menubar .right button { font-family: var(--mono); font-size: 11px; background: transparent; color: var(--ink-dim); border: 1px solid var(--line-bright); border-radius: 4px; padding: 3px 10px; cursor: pointer; }
  .menubar .right button:hover { color: var(--ink); border-color: var(--accent); }

  .hsplit, .vsplit { display: flex; width: 100%; height: 100%; min-height: 0; min-width: 0; }
  .vsplit { flex-direction: column; }
  .workspace { height: calc(100vh - 30px); }

  .window { display: flex; flex-direction: column; background: var(--panel); border: 1px solid var(--line); border-radius: 7px; margin: 5px; min-height: 0; min-width: 0; overflow: hidden; }
  .window > .titlebar { height: 26px; flex: 0 0 26px; display: flex; align-items: center; gap: 7px; padding: 0 8px 0 11px; background: var(--panel-2); border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 1.3px; color: var(--ink-dim); user-select: none; }
  .window > .titlebar .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex: 0 0 auto; }
  .window > .titlebar .grow { flex: 1; }
  .window > .titlebar .tbtn { font-size: 11px; color: var(--ink-faint); cursor: pointer; background: transparent; border: 1px solid var(--line-bright); border-radius: 3px; padding: 1px 6px; font-family: var(--mono); }
  .window > .titlebar .tbtn:hover { color: var(--ink); border-color: var(--accent); }
  .window > .titlebar .actbtn { font-size: 10px; color: var(--accent); cursor: pointer; background: var(--accent-dim); border: 1px solid var(--accent); border-radius: 3px; padding: 2px 9px; font-family: var(--mono); font-weight: 600; }
  .window > .titlebar .actbtn:hover { background: var(--accent); color: var(--bg); }
  .window > .content { flex: 1; min-height: 0; overflow: auto; display: flex; flex-direction: column; }

  .gutter { position: relative; z-index: 5; flex: 0 0 7px; }
  .gutter.col { cursor: col-resize; } .gutter.row { cursor: row-resize; }
  .gutter::after { content: ''; position: absolute; background: var(--line); border-radius: 2px; transition: background .15s; }
  .gutter.col::after { width: 2px; top: 14px; bottom: 14px; left: 2.5px; }
  .gutter.row::after { height: 2px; left: 14px; right: 14px; top: 2.5px; }
  .gutter:hover::after, .gutter.drag::after { background: var(--accent); }

  .load-btn { margin: 9px 11px; font-family: var(--mono); font-size: 12px; background: var(--accent-dim); color: var(--ink); border: 1px solid var(--accent); border-radius: 5px; padding: 8px; cursor: pointer; text-align: center; }
  .load-btn:hover { background: var(--accent); color: var(--bg); font-weight: 600; }
  .ds-list { overflow-y: auto; padding: 4px 9px 9px; flex: 1; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 5px; align-content: start; }
  .ds-item { font-family: var(--mono); font-size: 11px; padding: 6px 7px; min-width: 0; background: var(--panel-2); border: 1px solid var(--line); border-left: 3px solid var(--blue); border-radius: 4px; cursor: pointer; }
  .ds-item:hover { border-color: var(--line-bright); background: var(--soft-hover); }
  .ds-item.new { border-left-color: var(--accent); }
  .ds-item .nm { color: var(--ink); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ds-item .dim { color: var(--ink-faint); font-size: 10px; margin-top: 2px; }
  .ds-empty { color: var(--ink-faint); font-family: var(--mono); font-size: 11px; padding: 8px; grid-column: 1 / -1; }

  .nl-box { padding: 11px; display: flex; flex-direction: column; gap: 9px; }
  .nl-row { display: flex; gap: 8px; align-items: stretch; }
  .nl-input { flex: 1; font-family: var(--mono); font-size: 13px; background: var(--bg); color: var(--ink); border: 1px solid var(--line-bright); border-radius: 5px; padding: 9px 11px; outline: none; }
  .nl-input:focus { border-color: var(--accent); }
  .nl-input::placeholder { color: var(--ink-faint); }
  .nl-go { font-family: var(--mono); font-size: 12px; background: var(--panel-2); color: var(--ink); border: 1px solid var(--line-bright); border-radius: 5px; padding: 0 16px; cursor: pointer; flex: 0 0 112px; }
  .nl-go:hover { border-color: var(--accent); color: var(--accent); }
  .nl-go:disabled { opacity: .5; cursor: default; }
  .interp-box { background: var(--bg); border: 1px solid var(--line); border-left: 3px solid var(--blue); border-radius: 5px; padding: 9px 11px; font-size: 12px; color: var(--ink-dim); line-height: 1.5; }
  .interp-box .restate { color: var(--ink); }
  .interp-box .formula { margin-top: 7px; padding-top: 7px; border-top: 1px dashed var(--line); font-family: var(--mono); font-size: 13px; color: var(--amber); white-space: pre-wrap; }
  .code-wrap { display: flex; gap: 8px; align-items: stretch; }
  .code-wrap textarea { flex: 1; min-height: 84px; height: 84px; resize: vertical; font-family: var(--mono); font-size: 12px; color: var(--ink); background: var(--bg); border: 1px solid var(--line-bright); border-radius: 5px; padding: 9px 11px; outline: none; line-height: 1.5; white-space: pre; overflow-x: auto; }
  .code-wrap textarea:focus { border-color: var(--accent); }
  .code-btns { display: flex; flex: 0 0 112px; flex-direction: column; gap: 6px; justify-content: stretch; align-self: stretch; }
  .code-btns button { font-family: var(--mono); font-size: 11px; border-radius: 4px; padding: 8px 12px; cursor: pointer; border: 1px solid var(--line-bright); white-space: nowrap; flex: 1; }
  .code-btns .run { background: var(--panel-2); color: var(--ink); }
  .code-btns .run:hover { border-color: var(--accent); color: var(--accent); }
  .code-btns .runblock { background: var(--accent-dim); color: var(--ink); border-color: var(--accent); font-weight: 600; }
  .code-btns .runblock:hover { background: var(--accent); color: var(--bg); }
  .code-btns button:disabled { opacity:.5; cursor:default; }
  .parse-err { color: var(--red); font-family: var(--mono); font-size: 11px; }

  /* Blocks: 1.5cm squares flowing left→right */
  .blocks-scroll { flex: 1; overflow: auto; padding: 10px; }
  .blocks-flow { display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px; }
  .row-break { flex-basis: 100%; height: 0; }
  .rowlabel-inline { flex: 0 0 84px; display: flex; align-items: center; }
  .rowlabel-inline input { width: 100%; font-family: var(--mono); font-size: 10px; background: var(--panel-2); color: var(--ink); border: 1px solid var(--line); border-radius: 4px; padding: 3px 6px; outline: none; }
  .rowlabel-inline input:focus { border-color: var(--accent); }
  .blk { width: 1.5cm; height: 1.5cm; background: var(--panel-2); border: 1px solid var(--line); border-top: 3px solid var(--blue); border-radius: 6px; padding: 4px 5px; cursor: grab; display: flex; flex-direction: column; position: relative; user-select: none; transition: box-shadow .12s, transform .04s; }
  .blk.err { border-top-color: var(--red); }
  .blk.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .blk.selected { border-color: var(--amber); box-shadow: 0 0 0 2px rgba(217,164,91,.55); }
  .blk.dragging { box-shadow: 0 10px 26px rgba(0,0,0,.55); z-index: 40; cursor: grabbing; }
  .blk .top { display: flex; align-items: center; }
  .blk .idx { font-family: var(--mono); font-size: 9px; color: var(--blue); font-weight: 700; }
  .blk.err .idx { color: var(--red); }
  .blk .st { margin-left: auto; font-size: 10px; font-weight: 700; }
  .blk .st.ok { color: var(--green); } .blk .st.err { color: var(--red); } .blk .st.run { color: var(--amber); }
  .blk .mini { font-family: var(--mono); font-size: 7px; color: var(--ink-faint); line-height: 1.15; margin-top: 1px; flex: 1; overflow: hidden; }
  .blk .btns { display: flex; gap: 2px; }
  .blk .bbtn { flex: 1; font-family: var(--mono); font-size: 9px; background: var(--panel); color: var(--ink-dim); border: 1px solid var(--line); border-radius: 3px; padding: 1px 0; cursor: pointer; text-align: center; }
  .blk .bbtn:hover { color: var(--ink); border-color: var(--accent); }
  .blocks-empty { color: var(--ink-faint); font-family: var(--mono); font-size: 12px; padding: 30px 12px; text-align: center; line-height: 1.8; width: 100%; }
  .select-box { position: fixed; z-index: 75; border: 1px dashed var(--accent); background: rgba(111,140,255,.16); pointer-events: none; }

  /* Result / Log: accumulating panes */
  .stream { flex: 1; min-height: 0; overflow: auto; padding: 9px 13px; font-family: var(--mono); font-size: 12px; line-height: 1.5; }
  .stream .placeholder { color: var(--ink-faint); }
  .entry { border-bottom: 1px dashed var(--line); padding: 7px 0; white-space: pre-wrap; word-break: break-word; }
  .entry:last-child { border-bottom: none; }
  .entry .ehead { font-size: 10px; color: var(--ink-faint); margin-bottom: 3px; }
  .entry.err .ehead { color: var(--red); }
  .entry img { max-width: 100%; border: 1px solid var(--line); border-radius: 4px; margin: 4px 0; background: #fff; }
  .entry .interp { color: var(--green); border-left: 2px solid var(--green); padding-left: 8px; margin-top: 5px; white-space: pre-wrap; }
  table.df { border-collapse: collapse; }
  table.df th, table.df td { border: 1px solid var(--line); padding: 3px 6px; text-align: right; white-space: nowrap; }
  table.df th { background: var(--panel-2); color: var(--ink-dim); position: sticky; top: 0; }
  table.df td { color: var(--ink); }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 80; display: block; }
  .modal { background: var(--panel); border: 1px solid var(--line-bright); border-radius: 8px; width: min(900px,88vw); height: min(640px,78vh); max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%); resize: both; min-width: 420px; min-height: 260px; }
  .modal.full { left: 4vw !important; top: 5vh !important; transform: none !important; width: 92vw !important; height: 88vh !important; max-height: 88vh; resize: none; }
  .modal h3 { font-family: var(--mono); font-size: 13px; padding: 10px 12px 10px 16px; border-bottom: 1px solid var(--line); color: var(--accent); display: flex; gap: 6px; align-items: center; cursor: move; user-select: none; }
  .modal h3 .mtitle { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .modal h3 .x, .modal h3 .max { cursor: pointer; color: var(--ink-faint); border: 1px solid var(--line-bright); border-radius: 3px; padding: 0 8px; background: transparent; font-family: var(--mono); }
  .modal h3 .x:hover, .modal h3 .max:hover { color: var(--ink); border-color: var(--accent); }
  .modal .mbody { overflow: auto; padding: 14px 16px; font-family: var(--mono); font-size: 12px; white-space: pre-wrap; word-break: break-word; line-height: 1.5; flex: 1; }
  .modal .mbody img { max-width: 100%; background:#fff; border-radius:4px; }
  .modal .mfoot { padding: 10px 16px; border-top: 1px solid var(--line); text-align: right; }
  .modal .mfoot button { font-family: var(--mono); font-size: 12px; background: var(--panel-2); color: var(--ink); border: 1px solid var(--line-bright); border-radius: 4px; padding: 6px 16px; cursor: pointer; }

  .ctx { position: fixed; z-index: 90; background: var(--panel); border: 1px solid var(--line-bright); border-radius: 6px; padding: 4px; min-width: 130px; box-shadow: 0 6px 20px rgba(0,0,0,.5); }
  .ctx .item { font-family: var(--mono); font-size: 12px; padding: 7px 11px; border-radius: 4px; cursor: pointer; color: var(--ink); }
  .ctx .item:hover { background: var(--panel-2); }
  .ctx .item.danger:hover { background: #3a2424; color: var(--red); }


  .entry-actions { display: flex; gap: 6px; margin-top: 5px; }
  .entry-actions button { flex: 0 0 auto; min-width: 90px; padding: 3px 10px !important; font-size: 11px !important; }
  .progress-bg { position: fixed; inset: 0; z-index: 160; background: rgba(0,0,0,.42); display: flex; align-items: center; justify-content: center; }
  .progress-card { width: min(440px, 82vw); background: var(--panel); border: 1px solid var(--line-bright); border-radius: 10px; padding: 18px; box-shadow: 0 18px 44px rgba(0,0,0,.55); font-family: var(--mono); }
  .progress-card .ptitle { color: var(--accent); font-size: 13px; margin-bottom: 9px; }
  .progress-card .pmsg { color: var(--ink-dim); font-size: 11px; margin-bottom: 12px; line-height: 1.5; }
  .progress-card .pbar { height: 8px; background: var(--bg); border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
  .progress-card .pbar i { display: block; height: 100%; width: 30%; background: var(--accent); border-radius: 999px; transition: width .25s; }
  .progress-card .pnote { color: var(--ink-faint); font-size: 10px; margin-top: 9px; }
  .ds-item.selected { border-color: var(--amber); box-shadow: 0 0 0 2px rgba(217,164,91,.55); }


  .result-pre {
    white-space: pre-wrap;
    word-break: break-word;
    background: var(--result-card-bg);
    border: 1px solid var(--line-bright);
    border-left: 4px solid var(--accent);
    border-radius: 8px;
    padding: 11px 13px;
    margin-top: 4px;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.55;
    box-shadow: var(--result-card-shadow);
  }
  .entry .ehead::before {
    content: '◆ ';
    color: var(--accent);
  }
  .entry .interp {
    background: rgba(107,191,123,.08);
    border: 1px solid rgba(107,191,123,.22);
    border-left: 4px solid var(--green);
    border-radius: 7px;
    padding: 9px 11px;
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.55;
  }


  .top-tools { display: flex; align-items: center; gap: 6px; }
  .icon-btn {
    height: 24px; min-width: 28px; padding: 0 8px !important;
    display: inline-flex; align-items: center; justify-content: center; gap: 4px;
    border-radius: 999px !important; border: 1px solid var(--line-bright) !important;
    background: linear-gradient(180deg, var(--panel-2), var(--panel)) !important;
    color: var(--ink-dim) !important; cursor: pointer;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 1px 4px rgba(0,0,0,.12);
  }
  .icon-btn:hover { color: var(--accent) !important; border-color: var(--accent) !important; transform: translateY(-1px); }
  .icon-btn.active { color: var(--accent) !important; border-color: var(--accent) !important; background: var(--accent-dim) !important; }
  .ds-toolbar { display:flex; align-items:center; gap:7px; margin:9px 10px 6px; }
  .ds-toolbar .load-btn { margin: 0; flex: 1; border-radius: 999px; font-weight: 700; letter-spacing: .2px; }
  .ds-tool-btn { width: 34px; height: 34px; flex: 0 0 34px; border-radius: 11px; border: 1px solid var(--line-bright); background: linear-gradient(180deg, var(--panel-2), var(--panel)); color: var(--ink-dim); cursor: pointer; display:flex; align-items:center; justify-content:center; font-size:15px; }
  .ds-tool-btn:hover { color: var(--accent); border-color: var(--accent); transform: translateY(-1px); }
  .ds-item { position: relative; padding-bottom: 30px; }
  .ds-actions { position:absolute; left:6px; right:6px; bottom:5px; display:flex; gap:4px; opacity:.72; transition: opacity .15s; }
  .ds-item:hover .ds-actions { opacity:1; }
  .ds-ico { flex:1; height:20px; border:1px solid var(--line); border-radius:7px; background: rgba(15,20,25,.22); color: var(--ink-dim); cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; }
  body.light .ds-ico { background: rgba(255,255,255,.75); }
  .ds-ico:hover { color:var(--accent); border-color:var(--accent); background:var(--accent-dim); }
  .ctx .item .ico { display:inline-block; width:20px; text-align:center; margin-right:5px; }



  /* Theme-complete and font-scale fixes */
  .menubar, .menu > .mtitle, .menu .ditem, .menubar .right .logo,
  .window > .titlebar, .window > .titlebar .tbtn, .window > .titlebar .actbtn,
  .load-btn, .ds-item, .ds-item .dim, .ds-empty,
  .nl-input, .nl-go, .interp-box, .interp-box .formula,
  .code-wrap textarea, .code-btns button, .parse-err,
  .rowlabel-inline input, .blk .idx, .blk .st, .blk .mini, .blk .bbtn,
  .blocks-empty, .stream, .entry .ehead,
  .modal h3, .modal .mbody, .modal .mfoot button,
  .ctx .item, .entry-actions button,
  .progress-card, .progress-card .ptitle, .progress-card .pmsg, .progress-card .pnote,
  .result-pre, .icon-btn, .ds-tool-btn, .ds-ico {
    font-size: calc(var(--base-px, 12px) * var(--font-scale)) !important;
  }
  .menu > .mtitle, .menu .ditem, .menubar .right .logo { --base-px: 12px; }
  .window > .titlebar { --base-px: 10px; }
  .window > .titlebar .tbtn, .menubar .right button, .icon-btn { --base-px: 11px; }
  .load-btn, .nl-go, .stream, .modal .mbody, .modal .mfoot button, .ctx .item, .result-pre { --base-px: 12px; }
  .nl-input, .interp-box .formula, .modal h3 { --base-px: 13px; }
  .ds-item, .code-wrap textarea, .code-btns button, .parse-err, .progress-card .pmsg, .entry-actions button { --base-px: 11px; }
  .ds-item .dim, .ds-empty, .rowlabel-inline input, .blk .st, .entry .ehead, .progress-card .pnote { --base-px: 10px; }
  .blk .idx, .blk .bbtn { --base-px: 9px; }
  .blk .mini { --base-px: 7px; }
  .entry .interp { background: color-mix(in srgb, var(--green) 12%, var(--panel)); border-color: color-mix(in srgb, var(--green) 35%, var(--line)); }
  body.light .modal-bg { background: rgba(50, 63, 82, .28); }
  body.light .entry img { background: #fff; border-color: var(--line-bright); }

  .action-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    border-radius: 12px !important;

async function getSchema() {
  const code = `local({
    nms <- ls(.nlstat_env); parts <- character(0)
    for (n in nms) { d <- get(n, envir=.nlstat_env)
      if (is.data.frame(d)) { cols <- paste0('"', gsub('"','\\\\"', names(d)), '"', collapse=",")

    paste0("{", paste(parts, collapse=","), "}") })`;
  let schema = {};
  try { schema = JSON.parse(await webR.evalRString(code)); } catch(e) {}
  window._dsCache = schema;
  return schema;
}

function formatSchema(s) {
  const k = Object.keys(s);
  if (!k.length) return '(none)';
  return k.map(n => `- ${n}: columns=${JSON.stringify(s[n].columns)}, shape=${JSON.stringify(s[n].shape)}`).join('\n');
}

function formatLastContext(ctx) {
  if (!ctx) return '(none)';
  const result = (ctx.resultText || '').toString().slice(0, 2500);
  return [
    `Previous user/task summary: ${ctx.summary || '(none)'}`,
    `Previous R code:\n${ctx.code || '(none)'}`,
    `Previous formula: ${ctx.formula || '(none)'}`,
    `Previous result excerpt:\n${result || '(no printed result; maybe a plot or dataset was created)'}`,
    `Previous saved/created dataset: ${ctx.savedDataset || ctx.newDataset || '(none)'}`
  ].join('\n\n');
}

function looksLikeFollowUp(text) {
  return /(더\s*(자세|상세|많이|깊게)|자세한|상세한|추가|진단|해석|보고서|좀\s*더|more detailed|more detail|expand|deeper|diagnostic|explain more|full result)/i.test(text || '');
}
async function callLLM(messages, jsonMode) {
  const body = { model:OPENAI_MODEL, messages };
  if (jsonMode) body.response_format = { type:'json_object' };
  const resp = await fetch(OPENAI_PROXY_URL, {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  if (!resp.ok) throw new Error('OpenAI proxy call failed: ' + await resp.text());
  const data = await resp.json();
  return data?.choices?.[0]?.message?.content ?? data?.content ?? data?.message ?? '';
}
async function parseNL(text, lastContext=null) {
  text = text.trim(); if (!text) throw new Error('Empty input');
  const schema = await getSchema();
  const contextText = formatLastContext(lastContext);
  const followHint = looksLikeFollowUp(text) && lastContext
    ? '\nIMPORTANT: This looks like a follow-up request. Use the previous analysis context and expand it. Do not repeat the exact same code unless there is no reasonable alternative.'
    : '';
  const prompt = SYSTEM_PROMPT
    .replace('{schema}', formatSchema(schema))
    .replace('{context}', contextText)
    + followHint
    + `\nUser input: ${text}\nJSON:`;
  const raw = await callLLM([{role:'user',content:prompt}], true);
  let d; try { d = JSON.parse(raw); } catch(e){ throw new Error('Failed to parse LLM JSON response'); }
  if (!d.code) throw new Error("Missing 'code' field");
  return { code:String(d.code), summary:String(d.summary || text), formula:String(d.formula || '') };
}

async function executeR(code) {
  const before = new Set(Object.keys(window._dsCache || {}));
  const escaped = code.replace(/\\/g,'\\\\').replace(/"/g,'\\"');
  const resultKey = '.vibestats_result_' + Date.now() + '_' + Math.floor(Math.random()*100000);
  const wrap = `
.vibestats_run <- function() {
  .env <- .nlstat_env; result <- NULL
  .plotfile <- "/tmp/__vibestats_plot.png"
  if (file.exists(.plotfile)) file.remove(.plotfile)
  grDevices::png(.plotfile, width=720, height=480, res=96)
  .console <- capture.output({
    eval(parse(text="${escaped}"), envir=.env)
    if (exists("result", envir=.env, inherits=FALSE)) result <- get("result", envir=.env)
  })
  try(grDevices::dev.off(), silent=TRUE)
  if (exists("result", envir=.env, inherits=FALSE)) { result <- get("result", envir=.env); rm("result", envir=.env) }
  .resultText <- ""; .consoleText <- paste(.console, collapse="\\n"); .savedName <- ""; .resultKey <- ""
  .next_name <- function(prefix) { n <- prefix; i <- 1L; while (exists(n, envir=.env, inherits=FALSE)) { i <- i + 1L; n <- paste0(prefix, i) }; n }
    .as_saved_df <- function(x, printed) {
    if (is.data.frame(x)) return(x)
    if (is.matrix(x) || is.table(x)) return(as.data.frame(x))
    if (is.atomic(x) && length(x) > 100L) return(data.frame(value=as.vector(x), check.names=FALSE))
    data.frame(line=printed, stringsAsFactors=FALSE)
  }
  if (!is.null(result)) {
    .printed <- capture.output(print(result))
    .lineCount <- length(.printed)
    if (is.data.frame(result) || .lineCount > 100L) {
      .savedName <- .next_name("result_dataset")
      assign(.savedName, .as_saved_df(result, .printed), envir=.env)
      .resultText <- ""
      .consoleText <- paste(c(.consoleText, paste0("Large/raw result saved as dataset '", .savedName, "' instead of printing in Results.")), collapse="\n")
    } else {
      assign(${JSON.stringify(resultKey)}, result, envir=.env)
      .resultKey <- ${JSON.stringify(resultKey)}
      .resultText <- paste(.printed, collapse="\n")
    }
  }
  paste0("__RESULT__", .resultText, "__CONSOLE__", .consoleText, "__SAVED__", .savedName, "__RKEY__", .resultKey)
}
.vibestats_out <- tryCatch(.vibestats_run(), error=function(e) paste0("__ERR__", conditionMessage(e)))
.vibestats_out
`;
  const installed = new Set();
  for (let attempt=0; attempt<3; attempt++) {
    let out;
    try { out = await webR.evalRString(wrap); }
    catch(e){ throw new Error('R execution error: ' + (e.message||e)); }
    if (typeof out==='string' && out.startsWith('__ERR__')) {
      const msg = out.slice(7);
      const m = msg.match(/there is no package called\s*['"\u2018\u2019\u201c\u201d`]?\s*([\w.]+)/);
      const pkg = m ? m[1] : null;
      if (pkg && !installed.has(pkg)) {
        try { await webR.installPackages([pkg]); installed.add(pkg); continue; }
        catch(ie){ throw new Error(`R execution error: failed to auto-install package '${pkg}'`); }
      }
      throw new Error('R execution error: ' + msg);
    }
    let resultText = '', consoleText = '', savedDataset = '', resultKeyOut = '';
    const ri = out.indexOf('__RESULT__'), ci = out.indexOf('__CONSOLE__'), si = out.indexOf('__SAVED__'), ki = out.indexOf('__RKEY__');
    if (ri>=0 && ci>=0 && si>=0 && ki>=0) {
      resultText = out.slice(ri+10, ci);
      consoleText = out.slice(ci+11, si);
      savedDataset = out.slice(si+9, ki);
      resultKeyOut = out.slice(ki+8);
    }
    let plot = null;
    try { const buf = await webR.FS.readFile('/tmp/__vibestats_plot.png');
      if (buf && buf.length>100) { let bin=''; for(let i=0;i<buf.length;i++) bin+=String.fromCharCode(buf[i]);
        plot='data:image/png;base64,'+btoa(bin); await webR.FS.unlink('/tmp/__vibestats_plot.png').catch(()=>{}); } } catch(e){}
    await getSchema();
    const after = Object.keys(window._dsCache||{});
    const newOnes = after.filter(n=>!before.has(n));
    return { resultText, consoleText, plot, savedDataset, resultKey:resultKeyOut, newDataset: newOnes.length?newOnes[newOnes.length-1]:null };
  }
  throw new Error('R execution error: still failing after package install');
}

async function saveStoredResultAsDataset(resultKey, requestedName) {
  const safe = (requestedName || '').trim().replace(/\W+/g, '_').replace(/^_+|_+$/g, '');
  if (!safe) throw new Error('Dataset name is empty.');
  const nm = /^\d/.test(safe) ? 'd_' + safe : safe;
  const code = `local({
    .env <- .nlstat_env
    key <- ${JSON.stringify(resultKey)}; nm <- ${JSON.stringify(nm)}
    if (!exists(key, envir=.env, inherits=FALSE)) stop("Saved result is no longer available.")
    x <- get(key, envir=.env)
    df <- NULL
    if (is.data.frame(x)) df <- x
    else if (is.matrix(x) || is.table(x)) df <- as.data.frame(x)
    else if (is.atomic(x)) df <- data.frame(value=as.vector(x), check.names=FALSE)
    else df <- as.data.frame(capture.output(print(x)), stringsAsFactors=FALSE)
    base <- nm; i <- 1L
    while (exists(nm, envir=.env, inherits=FALSE)) { i <- i + 1L; nm <- paste0(base, i) }
    assign(nm, df, envir=.env)
    nm
  })`;
  const finalName = await webR.evalRString(code);
  await getSchema();
  return finalName;
}

function importInfo(fname) {
  const ext = (fname.split('.').pop()||'').toLowerCase();
  const map = {
    csv:  { lib:null,     read:(p)=>`utils::read.csv(${p}, stringsAsFactors=FALSE)` },
    tsv:  { lib:null,     read:(p)=>`utils::read.delim(${p}, stringsAsFactors=FALSE)` },
    dta:  { lib:'haven',  read:(p)=>`as.data.frame(haven::read_dta(${p}))` },
    sav:  { lib:'haven',  read:(p)=>`as.data.frame(haven::read_sav(${p}))` },
    por:  { lib:'haven',  read:(p)=>`as.data.frame(haven::read_por(${p}))` },
    sas7bdat:{ lib:'haven', read:(p)=>`as.data.frame(haven::read_sas(${p}))` },
    xpt:  { lib:'haven',  read:(p)=>`as.data.frame(haven::read_xpt(${p}))` },
    xls:  { lib:'readxl', read:(p)=>`as.data.frame(readxl::read_excel(${p}))` },
    xlsx: { lib:'readxl', read:(p)=>`as.data.frame(readxl::read_excel(${p}))` },
    rds:  { lib:null,     read:(p)=>`as.data.frame(readRDS(${p}))` },
    rdata:{ lib:null,     read:(p)=>`local({ e<-new.env(); load(${p}, envir=e); get(ls(e)[1], envir=e) })` },
    rda:  { lib:null,     read:(p)=>`local({ e<-new.env(); load(${p}, envir=e); get(ls(e)[1], envir=e) })` },
  };
  return map[ext] || null;
}

async function loadDataFile(name, file) {
  const info = importInfo(file.name);
  if (!info) throw new Error('Unsupported file type: ' + file.name);
  const ext = (file.name.split('.').pop()||'').toLowerCase();
  const path = '/tmp/' + name + '.' + ext;
  if (ext==='csv' || ext==='tsv') {
    await webR.FS.writeFile(path, new TextEncoder().encode(await file.text()));
  } else {
    const buf = new Uint8Array(await file.arrayBuffer());
    await webR.FS.writeFile(path, buf);
  }
  if (info.lib) { try { await webR.installPackages([info.lib]); } catch(e){} }
  const rexpr = info.read(JSON.stringify(path));
  await webR.evalRVoid(`assign(${JSON.stringify(name)}, ${rexpr}, envir=.nlstat_env)`);
  await getSchema();
}

async function previewHTML(name, startRow=1, endRow=10000) {
  startRow = Math.max(1, parseInt(startRow || 1, 10));
  endRow = Math.max(startRow, parseInt(endRow || startRow, 10));
  const code = `local({ d <- get(${JSON.stringify(name)}, envir=.nlstat_env)
    if (is.null(d)) return("")
    nr <- nrow(d); start <- max(1L, min(${startRow}L, nr)); end <- max(start, min(${endRow}L, nr))
    d <- d[start:end, , drop=FALSE]
    esc <- function(x) gsub("<","&lt;", gsub("&","&amp;", as.character(x)))
    th <- paste0("<th>", c("row", esc(names(d))), "</th>", collapse="")
    rows <- character(0)
    if (nrow(d) > 0) {
      rows <- vapply(seq_len(nrow(d)), function(i) {
        vals <- c(start + i - 1L, esc(d[i, , drop=TRUE]))
        paste0("<tr>", paste0("<td>", vals, "</td>", collapse=""), "</tr>")
      }, character(1))
    }
    paste0("<table class='df'><thead><tr>", th, "</tr></thead><tbody>", paste(rows, collapse=""), "</tbody></table>") })`;
  return await webR.evalRString(code);

function analyzeError(msg) {
  const m = msg.replace(/^R execution error:\s*/, '').trim();
  const rules = [
    [/need finite ['"]?xlim|need finite ['"]?ylim/i,
     'The values being plotted are not numeric (character/date/factor) or are all NA/Inf, so axis limits cannot be computed.',
     '• Run str(dataset) to check the column type (must be num/int).\n• If numbers came in as text, convert with as.numeric(col).\n• If it is a date, use as.Date(col).\n• Strip commas/currency symbols before converting.'],
    [/non-stationary AR part/i,
     'The AR coefficients were estimated into a non-stationary region. This is common when fitting AR directly to a price (level) series with a trend.',
     '• For prices, fit AR to log returns: diff(log(x)).\n• Or use a differenced model ARIMA(p,1,0).\n• Try arima(..., method="ML").'],
    [/there is no package called\s*['"\u2018\u2019\u201c\u201d`]?\s*([\w.]+)/i,
     (mm)=>`Package '${mm[1]}' is not installed.`,
     '• It is usually auto-installed. If this repeats, the package may not be built for WebR (browser R).\n• Check its WebAssembly availability on the repo.r-wasm.org dashboard.'],
    [/argument ["']?x["']? is missing|missing, with no default/i,
     'A required argument of the function was not supplied (e.g. gmm needs moment conditions and a data matrix).',
     '• Check the function signature; gmm/ivreg etc. require specific arguments.\n• For a simple mean/relationship, a plain lm() is usually the right tool.'],
    [/object ['"]?([\w.]+)['"]? not found/i,
     (mm)=>`Object (variable/column/dataset) '${mm[1]}' was not found.`,
     '• Check spelling and case of dataset and column names.\n• Use exactly the names shown in the dataset list.\n• Run names(dataset) to see the real column names.'],
    [/undefined columns selected|subscript out of bounds/i,
     'A non-existent column (or out-of-range index) was selected.',
     '• Run names(dataset) and use only those names.'],
    [/contrasts can be applied only to factors with 2 or more levels/i,
     'A categorical predictor in the regression has only one level.',
     '• Check with table(col) that the variable has 2+ distinct values.'],
    [/missing values|NA\/NaN\/Inf|infinite/i,
     'NA/Inf/NaN entered a computation the function cannot handle.',
     '• Remove missing values with na.omit(dataset), or use missing="drop" in regression.\n• Check for log/division producing Inf/NaN.'],
    [/non-numeric argument to (binary operator|mathematical function)/i,
     'A numeric operation received character/factor values.',
     '• Check types with str(dataset) and convert needed columns with as.numeric().'],
    [/could not find function ['"]?([\w.]+)/i,
     (mm)=>`Function '${mm[1]}' was not found; its package is not loaded.`,
     '• Add library(pkg) at the top (e.g. gls needs library(nlme)).'],
  ];
  for (const [re, cause, fix] of rules) {
    const mm = m.match(re);
    if (mm) return { cause: typeof cause==='function'?cause(mm):cause, fix: typeof fix==='function'?fix(mm):fix };
  }
  return { cause:'Unexpected error. See the original message below.',
           fix:'• Open the block ⓘ to inspect the executed R code.\n• Verify dataset/column names and types (str).\n• Try rephrasing the prompt more specifically.' };
}
function buildErrorLog(msg) {
  const a = analyzeError(msg);
  return `■ Original: ${msg.replace(/^R execution error:\s*/,'')}\n\n■ Cause:\n${a.cause}\n\n■ Suggested fix:\n${a.fix}`;
}

function now() { return new Date().toLocaleTimeString('en-US', {hour12:false}); }

function beginModalDrag(e) {
  if (e.button !== 0 || e.target.closest('.x,.max')) return;
  const modal = e.currentTarget.closest('.modal');
  if (!modal || modal.classList.contains('full')) return;
  e.preventDefault();
  const r = modal.getBoundingClientRect();
  modal.style.left = r.left + 'px';
  modal.style.top = r.top + 'px';
  modal.style.width = r.width + 'px';
  modal.style.height = r.height + 'px';
  modal.style.transform = 'none';
  const dx = e.clientX - r.left, dy = e.clientY - r.top;
  const move = (ev) => {
    modal.style.left = Math.max(0, Math.min(window.innerWidth - 80, ev.clientX - dx)) + 'px';
    modal.style.top = Math.max(0, Math.min(window.innerHeight - 50, ev.clientY - dy)) + 'px';
  };
  const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
  document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
}

function useSplitter() {
  return useCallback((e, dir, grow) => {
    e.preventDefault();
    const g = e.currentTarget; g.classList.add('drag');
    const horiz = dir === 'h';
    const target = grow === 'next' ? g.nextElementSibling : g.previousElementSibling;
    const start = horiz ? e.clientX : e.clientY;
    const startSize = horiz ? target.getBoundingClientRect().width : target.getBoundingClientRect().height;
    const move = (ev) => {
      const cur = horiz ? ev.clientX : ev.clientY;
      const delta = cur - start;
      const next = startSize + (grow === 'next' ? -delta : delta);
      target.style.flex = `0 0 ${Math.max(110, next)}px`;
    };
    const up = () => { g.classList.remove('drag'); document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); };
    document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
  }, []);
}

function StreamPane({ entries, kind, onInterpret, onSaveResult }) {
  const ref = useRef();
  useEffect(() => { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [entries.length]);
  if (!entries.length) return h('div', { className:'stream', ref },
    h('span', { className:'placeholder' }, kind==='result' ? 'Analysis results will accumulate here.' : 'Console output and errors will accumulate here.'));
  return h('div', { className:'stream', ref },
    entries.map(en => h('div', { key:en.id, className:'entry'+(en.error?' err':'') },
      h('div', { className:'ehead' }, en.head),
      en.plot && h('img', { src:en.plot }),
      en.text && (kind==='result' ? h('pre', { className:'result-pre' }, en.text) : h('span', null, en.text)),
      kind==='result' && !en.error && (en.text||en.plot) &&
        h('div', { className:'entry-actions' },
          onInterpret && (en.interp ? h('div',{className:'interp'}, en.interp)
            : h('button', { className:'nl-go', onClick:()=>onInterpret(en.id) }, en.interpreting ? '해석 중…' : 'Interpret')),
          onSaveResult && en.resultKey && h('button', { className:'nl-go', onClick:()=>onSaveResult(en.id) }, 'Save')))));
}

  async function runCodeCore(code) {
    return await executeR(code).catch(e => ({ error: e.message||String(e) }));
  }

  async function runCodeWithRepair(initialCode, summary) {
    let currentCode = initialCode, currentSummary = summary, currentFormula = formula;
    let res = null;
    for (let attempt=1; attempt<=5; attempt++) {
      showProgress(attempt===1 ? 'Running R code…' : `Repairing and retrying R code (${attempt}/5)…`, Math.min(88, 15 + attempt*14), '오류가 있으면 최대 5회까지 자동으로 코드를 수정해 다시 실행합니다.');
      res = await runCodeCore(currentCode);
      if (!res.error) return { res, code:currentCode, summary:currentSummary, formula:currentFormula, repaired:attempt>1 };
      const msg = buildErrorLog(res.error);
      setParseErr(`오류가 발생했습니다. 자동 수정 시도 ${attempt}/5\n${msg}`);
      pushLog({ head:`[${now()}] auto-repair ${attempt}/5`, error:true, text:msg });
      if (attempt===5) break;
      try {
        const fixed = await repairRCode(currentCode, currentSummary, res.error, attempt+1);
        currentCode = fixed.code; currentSummary = fixed.summary || currentSummary; currentFormula = fixed.formula || currentFormula;
        setCodeText(currentCode); setRestate(currentSummary); setFormula(currentFormula);
        pushLog({ head:`[${now()}] code repaired ${attempt}/5`, text: fixed.reason || 'Code was revised automatically.' });
      } catch(repairErr) {
        res = { error: 'Auto-repair failed: ' + (repairErr.message || repairErr) };
        setParseErr(`오류가 발생했고 자동 수정에도 실패했습니다.\n${buildErrorLog(res.error)}`);
        break;
      }
    }
    return { res, code:currentCode, summary:currentSummary, formula:currentFormula, repaired:true };
  }

  async function onRunOnly() {

    await refreshSchema();
    dispatchOutput(rr.res, rr.summary || code.split('\n')[0].slice(0,40), rr.code);
    if (rr.repaired && !rr.res.error) setParseErr('오류가 자동으로 수정되어 정상 실행되었습니다. 수정된 코드가 Enter code 창에 반영되었습니다.');
    hideProgress(); setBusy(false);
  }

  async function onRunBlock() {
    const code = codeText.trim();
    if (!code) { setParseErr('No code to run.'); return; }
    const index = blocks.length + 1;
    const id = 'b' + (++idCounter.current);
    setBusy(true); setParseErr('');
    const rr = await runCodeWithRepair(code, restate || code.split('\n')[0].slice(0,40));
    await refreshSchema();
    const status = rr.res.error ? 'err' : 'ok';
    const block = { id, index, summary:rr.summary||code.split('\n')[0].slice(0,40), code:rr.code, formula:rr.formula||'', status, label:'', newline:false };
    setBlocks(bs => [...bs, block]);
    setActiveId(id);
    dispatchOutput(rr.res, `#${index} ${rr.summary||''}`.trim(), rr.code);
    if (!rr.res.error && rr.res.newDataset) setNewNames(p=>p.includes(rr.res.newDataset)?p:[...p,rr.res.newDataset]);
    if (!rr.res.error && rr.res.savedDataset) setNewNames(p=>p.includes(rr.res.savedDataset)?p:[...p,rr.res.savedDataset]);
    if (rr.repaired && !rr.res.error) setParseErr('오류가 자동으로 수정되어 정상 실행되었습니다. 수정된 코드가 Enter code 창에 반영되었습니다.');
    if (!rr.res.error && !rr.repaired) { promptRef.current.value=''; setCodeText(''); setRestate(''); setFormula(''); }
    hideProgress(); setBusy(false);
  }

  function dispatchOutput(res, head, code) {
    const ts = `[${now()}] ${head}`;
    if (res.error) {
      pushLog({ head: ts + ' — FAILED', error:true, text: buildErrorLog(res.error) });
      return;
    }
    if (res.savedDataset) {
      pushLog({ head: ts + ' — dataset saved', text:`Raw data result was saved as dataset '${res.savedDataset}' and was not printed in Results.` });
    }
    if (res.newDataset && res.newDataset !== res.savedDataset) {
      pushLog({ head: ts + ' — dataset created', text:`New dataset created: '${res.newDataset}'.` });
    }
    const resultLineCount = res.resultText ? res.resultText.split(/\r?\n/).length : 0;
    if (res.resultText && resultLineCount > 100) {
      pushLog({ head: ts + ' — large result suppressed', text:'A result with more than 100 lines was not printed in Results. Use Save or assign the output to a dataset to inspect it.' });
    }
    if (((res.resultText && res.resultText.trim() && resultLineCount <= 100) || res.plot)) {
      pushResult({ head: ts, text: res.resultText ? res.resultText.trim() : '', plot: res.plot || null,
                   _code: code, _summary: head, resultKey: res.resultKey || null });
    }
    if (res.consoleText && res.consoleText.trim()) {
      pushLog({ head: ts, text: res.consoleText.trim() });
    } else if (!((res.resultText&&res.resultText.trim())||res.plot) && !res.savedDataset) {
      pushLog({ head: ts, text: '(no output)' });
    }
    if (!res.error) {
      setLastRunContext({
        summary: head,
        code,
        formula,
        resultText: res.resultText || '',
        consoleText: res.consoleText || '',
        plot: !!res.plot,
        savedDataset: res.savedDataset || '',
        newDataset: res.newDataset || ''
      });
    }
  }

      if (ans === null) return;
      const m = ans.match(/(\d+)\s*[-:,~]\s*(\d+)/);
      if (m) { start = parseInt(m[1],10); end = parseInt(m[2],10); }
      else { const n = parseInt(ans,10); if (Number.isFinite(n)) { start = 1; end = n; } }
      if (end - start + 1 > 10000 && !confirm('More than 10,000 rows may be slow. Continue?')) return;
    }
    let html=''; try{ html=await previewHTML(name,start,end);}catch(e){ html = `<div style="color:var(--red)">${String(e.message||e)}</div>`; }
    setModal({ title:`${name}  (${sh[0]} × ${sh[1]}) rows ${start}-${Math.min(end, sh[0])}`, html });

  async function onRenameDataset(oldName) {
    const proposed = prompt(`Rename dataset '${oldName}' to:`, oldName);
    if (proposed===null) return;
    let nm = proposed.trim().replace(/\W+/g,'_').replace(/^_+|_+$/g,'');
    if (!nm) { alert('Dataset name cannot be empty.'); return; }
    if (/^\d/.test(nm)) nm = 'd_' + nm;
    try {
      await webR.evalRVoid(`local({ .env <- .nlstat_env; old <- ${JSON.stringify(oldName)}; new <- ${JSON.stringify(nm)}; if (!exists(old, envir=.env, inherits=FALSE)) stop("dataset not found"); if (exists(new, envir=.env, inherits=FALSE)) stop("target name already exists"); assign(new, get(old, envir=.env), envir=.env); rm(list=old, envir=.env) })`);
      await refreshSchema();
      setNewNames(p=>p.map(x=>x===oldName?nm:x));
      setSelectedDatasets(p=>p.map(x=>x===oldName?nm:x));
      pushLog({ head:`[${now()}] dataset renamed`, text:`${oldName} → ${nm}` });
    } catch(err) { alert('Rename failed: '+(err.message||err)); }
  }
  async function onSaveDataset(name) {
    const csv = await exportCSV(name);
    const blob = new Blob([csv], {type:'text/csv'});
    await saveBlobFile(name+'.csv', 'text/csv', blob);
  }

      for (const n of names) {
        const handle = await dir.getFileHandle(n+'.csv', {create:true});
        const writable = await handle.createWritable();
        await writable.write(await exportCSV(n));
        await writable.close();
      }
      pushLog({ head:`[${now()}] save all datasets`, text:`Saved ${names.length} CSV files to the selected folder.` });
    } else {
      for (const n of names) { await onSaveDataset(n); await new Promise(r=>setTimeout(r,150)); }
      alert('Your browser does not support folder selection here, so each CSV was downloaded separately. Chrome/Edge support selecting a folder.');
    }

function renderBlocksFlow(blocks, activeId, selectedIds, fns) {
  const out = [];
  blocks.forEach((b, i) => {
    if (b.newline && i!==0) out.push(h('div',{key:'br'+b.id,className:'row-break'}));
    if (i===0 || b.newline) out.push(h('div',{key:'lb'+b.id,className:'rowlabel-inline'},
      h('input',{ placeholder:'label', value:b.label, onChange:e=>fns.setLabel(b.id,e.target.value), onMouseDown:e=>e.stopPropagation() })));
    out.push(blockSquare(b, activeId, selectedIds, fns));
  });
  return out;
}
function blockSquare(b, activeId, selectedIds, fns) {
  const onDown = (e) => {
    if (e.button!==0) return;
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault(); e.stopPropagation();
      fns.setSelectedIds(ids => ids.includes(b.id) ? ids.filter(x=>x!==b.id) : [...ids, b.id]);
      fns.setActiveId(b.id);
      return;
    }
    fns.setSelectedIds([]); fns.setActiveId(b.id);
    const el = e.currentTarget;
    const startX = e.clientX, startY = e.clientY;
    let moved=false, raf=null, curDX=0, curDY=0;
    const apply = () => { el.style.transform = `translate(${curDX}px, ${curDY}px)`; raf=null; };
    const move = (ev) => {
      curDX = ev.clientX-startX; curDY = ev.clientY-startY;
      if (Math.abs(curDX)>4 || Math.abs(curDY)>4) { if(!moved){moved=true; el.classList.add('dragging');} }
      if (moved && !raf) raf = requestAnimationFrame(apply);
    };
    const up = (ev) => {
      document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up);
      if (raf) cancelAnimationFrame(raf);
      el.classList.remove('dragging'); el.style.transform='';
      if (moved) { const dy = ev.clientY-startY; if (dy>28) fns.toggleNewline(b.id,true); else if (dy<-28) fns.toggleNewline(b.id,false); }
    };
    document.addEventListener('mousemove',move); document.addEventListener('mouseup',up);
  };
  return h('div', { key:b.id, 'data-id':b.id, className:'blk '+(b.status==='err'?'err ':'')+(b.id===activeId?'active ':'')+(selectedIds.includes(b.id)?'selected':''),
    title:b.summary, onMouseDown:onDown,
    onContextMenu:e=>{ e.preventDefault(); fns.setCtx({x:e.clientX,y:e.clientY,kind:'block',id:b.id}); } },
    h('div',{className:'top'}, h('span',{className:'idx'},'#'+b.index),
      h('span',{className:'st '+(b.status==='run'?'run':b.status==='ok'?'ok':'err')}, b.status==='run'?'…':b.status==='ok'?'✓':'✗')),
    h('div',{className:'mini'}, (b.summary||'').slice(0,22)),
    h('div',{className:'btns'},
      h('div',{className:'bbtn',title:'rerun',onMouseDown:e=>e.stopPropagation(),onClick:()=>fns.rerun(b.id)},'↻'),
      h('div',{className:'bbtn',title:'info',onMouseDown:e=>e.stopPropagation(),onClick:()=>fns.showBlockInfo(b.id)},'ⓘ')));
}
function dsItem(n, info, isNew, selected, fns) {
  const clickOpen = (e) => {
    if (e.ctrlKey || e.metaKey) { e.preventDefault(); e.stopPropagation(); fns.setSelectedDatasets(ds=>ds.includes(n)?ds.filter(x=>x!==n):[...ds,n]); return; }
    fns.setSelectedDatasets([]); fns.showPreview(n);
  };
  const stop = (e) => { e.preventDefault(); e.stopPropagation(); };
  return h('div', { key:n, 'data-name':n, className:'ds-item'+(isNew?' new':'')+(selected?' selected':''),
    onClick:clickOpen,
    onContextMenu:e=>{ e.preventDefault(); if (selected) fns.setCtx({x:e.clientX,y:e.clientY,kind:'dataset',name:n}); else { fns.setSelectedDatasets([]); fns.setCtx({x:e.clientX,y:e.clientY,kind:'dataset',name:n}); } } },
    h('div',{className:'nm', title:n}, n),
    h('div',{className:'dim'}, `${info.shape[0]} × ${info.shape[1]}${isNew?' · new':''}`),
    h('div',{className:'ds-actions'},
      h('button',{className:'ds-ico', title:'Preview', onMouseDown:stop, onClick:e=>{stop(e); fns.showPreview(n);}}, '👁'),
      h('button',{className:'ds-ico', title:'Save CSV', onMouseDown:stop, onClick:e=>{stop(e); fns.onSaveDataset(n);}}, '⇩'),
      h('button',{className:'ds-ico', title:'Rename', onMouseDown:stop, onClick:e=>{stop(e); fns.onRenameDataset(n);}}, '✎'),
      h('button',{className:'ds-ico', title:'Delete', onMouseDown:stop, onClick:e=>{stop(e); if(confirm(`Delete '${n}'?`)) fns.onDeleteDataset(n);}}, '×')));
}
