<title>Vibestats — WebR Statistical Analysis</title>
<style>
  :root {
    --bg: #0f1419; --panel: #1a212b; --panel-2: #232c38;
    --line: #2d3744; --line-bright: #3a4757;
    --ink: #e4e9ef; --ink-dim: #8a97a6; --ink-faint: #5d6977;
    --accent: #6f8cff; --accent-dim: #34407a;
    --blue: #5b9dd9; --amber: #d9a45b; --red: #d96b6b; --green: #6bbf7b;
    --mono: 'SF Mono','JetBrains Mono','Menlo','Consolas',monospace;
    --sans: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --font-scale: 1;
    --menubar: #141a22;
    --result-card-bg: linear-gradient(180deg, rgba(35,44,56,.92), rgba(15,20,25,.72));
    --result-card-shadow: inset 0 1px 0 rgba(255,255,255,.03), 0 10px 24px rgba(0,0,0,.16);
    --soft-hover: #28323f;
  }
  body.light {
    --bg: #f6f8fc; --panel: #ffffff; --panel-2: #edf2f8;
    --line: #d5deea; --line-bright: #b8c4d4;
    --ink: #152033; --ink-dim: #536177; --ink-faint: #8994a5;
    --accent: #4f6df5; --accent-dim: #e5eaff;
    --blue: #2f77b4; --amber: #b87524; --red: #c84f4f; --green: #2e8b57;
    --menubar: #ffffff;
    --result-card-bg: linear-gradient(180deg, rgba(255,255,255,.98), rgba(237,242,248,.88));
    --result-card-shadow: inset 0 1px 0 rgba(255,255,255,.8), 0 10px 24px rgba(47,65,90,.10);
    --soft-hover: #e8eef7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: calc(13px * var(--font-scale)); overflow: hidden; }

  #boot { position: fixed; inset: 0; z-index: 200; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; transition: opacity .5s; }
  #boot .mark { font-family: var(--mono); font-size: 26px; letter-spacing: 2px; }
  #boot .mark b { color: var(--accent); } #boot .mark .r { color: var(--blue); }
  #boot .bar { width: 300px; height: 2px; background: var(--line); overflow: hidden; position: relative; }
  #boot .bar i { position: absolute; inset: 0; width: 40%; background: var(--accent); animation: slide 1.1s ease-in-out infinite; }
  @keyframes slide { 0%{left:-40%} 100%{left:100%} }
  #boot .status { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); height: 14px; }

  .menubar { height: 30px; display: flex; align-items: stretch; background: var(--menubar); border-bottom: 1px solid var(--line); font-size: calc(12px * var(--font-scale)); position: relative; z-index: 60; }
  .menu { position: relative; }
  .menu > .mtitle { padding: 0 14px; height: 100%; display: flex; align-items: center; cursor: pointer; color: var(--ink-dim); font-family: var(--mono); }
  .menu > .mtitle:hover, .menu.open > .mtitle { background: var(--panel-2); color: var(--ink); }
  .menu .dropdown { position: absolute; top: 100%; left: 0; min-width: 230px; background: var(--panel); border: 1px solid var(--line-bright); border-radius: 0 0 6px 6px; padding: 4px; box-shadow: 0 8px 24px rgba(0,0,0,.5); }
  .menu .ditem { padding: 8px 12px; border-radius: 4px; cursor: pointer; color: var(--ink); font-family: var(--mono); font-size: 12px; white-space: nowrap; }
  .menu .ditem:hover { background: var(--panel-2); color: var(--accent); }
  .menu .dsep { height: 1px; background: var(--line); margin: 4px 6px; }
  .menubar .spacer { flex: 1; }
  .menubar .right { display: flex; align-items: center; gap: 10px; padding: 0 14px; }
  .menubar .right .logo { font-family: var(--mono); font-weight: 600; letter-spacing: 1px; }
  .menubar .right .logo b { color: var(--accent); } .menubar .right .logo .r { color: var(--blue); }
  .menubar .right button { font-family: var(--mono); font-size: 11px; background: transparent; color: var(--ink-dim); border: 1px solid var(--line-bright); border-radius: 4px; padding: 3px 10px; cursor: pointer; }
  .menubar .right button:hover { color: var(--ink); border-color: var(--accent); }

  .hsplit, .vsplit { display: flex; width: 100%; height: 100%; min-height: 0; min-width: 0; }
  .vsplit { flex-direction: column; }
  .workspace { height: calc(100vh - 30px); }

  .window { display: flex; flex-direction: column; background: var(--panel); border: 1px solid var(--line); border-radius: 7px; margin: 5px; min-height: 0; min-width: 0; overflow: hidden; }
  .window > .titlebar { height: 26px; flex: 0 0 26px; display: flex; align-items: center; gap: 7px; padding: 0 8px 0 11px; background: var(--panel-2); border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 1.3px; color: var(--ink-dim); user-select: none; }
  .window > .titlebar .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex: 0 0 auto; }
  .window > .titlebar .grow { flex: 1; }
  .window > .titlebar .tbtn { font-size: 10px; color: var(--ink-faint); cursor: pointer; background: transparent; border: 1px solid var(--line-bright); border-radius: 3px; padding: 1px 5px; font-family: var(--mono); line-height: 1.4; }
  .window > .titlebar .tbtn:hover { color: var(--ink); border-color: var(--accent); }
  /* Text-label title buttons (e.g. "rcode") size to their text instead of a fixed icon box */
  .window > .titlebar .tbtn.text-tbtn { padding: 1px 7px; width: auto; min-width: 0; flex: 0 0 auto; }
  .window > .titlebar .actbtn { font-size: 10px; color: var(--accent); cursor: pointer; background: var(--accent-dim); border: 1px solid var(--accent); border-radius: 3px; padding: 2px 9px; font-family: var(--mono); font-weight: 600; }
  .window > .titlebar .actbtn:hover { background: var(--accent); color: var(--bg); }
  .window > .content { flex: 1; min-height: 0; overflow: auto; display: flex; flex-direction: column; }

  .gutter { position: relative; z-index: 5; flex: 0 0 7px; }
  .gutter.col { cursor: col-resize; } .gutter.row { cursor: row-resize; }
  .gutter::after { content: ''; position: absolute; background: var(--line); border-radius: 2px; transition: background .15s; }
  .gutter.col::after { width: 2px; top: 14px; bottom: 14px; left: 2.5px; }
  .gutter.row::after { height: 2px; left: 14px; right: 14px; top: 2.5px; }
  .gutter:hover::after, .gutter.drag::after { background: var(--accent); }

  .load-btn { margin: 9px 11px; font-family: var(--mono); font-size: 12px; background: var(--accent-dim); color: var(--ink); border: 1px solid var(--accent); border-radius: 5px; padding: 8px; cursor: pointer; text-align: center; }
  .load-btn:hover { background: var(--accent); color: var(--bg); font-weight: 600; }
  .ds-list { overflow-y: auto; padding: 4px 9px 9px; flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(122px, 1fr)); gap: 5px; align-content: start; }
  .ds-item { font-family: var(--mono); font-size: 11px; padding: 6px 7px; min-width: 0; background: var(--panel-2); border: 1px solid var(--line); border-left: 3px solid var(--blue); border-radius: 4px; cursor: pointer; }
  .ds-item:hover { border-color: var(--line-bright); background: var(--soft-hover); }
  .ds-item.new { border-left-color: var(--accent); }
  .ds-item.kind-uploaded { border-left-color: var(--blue); }
  .ds-item.kind-created { border-left-color: var(--amber); }
  .ds-item.kind-result { border-left-color: var(--green); }
  .ds-item .nm { color: var(--ink); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ds-item .dim { color: var(--ink-faint); font-size: 10px; margin-top: 2px; }
  .ds-empty { color: var(--ink-faint); font-family: var(--mono); font-size: 11px; padding: 8px; grid-column: 1 / -1; }

  .ds-list.ds-list-full { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); padding: 9px 13px 13px; }

  .nl-box { padding: 11px; display: flex; flex-direction: column; gap: 9px; }
  .nl-row { display: flex; gap: 8px; align-items: stretch; }
  .nl-input { flex: 1; font-family: var(--mono); font-size: 13px; background: var(--bg); color: var(--ink); border: 1px solid var(--line-bright); border-radius: 5px; padding: 9px 11px; outline: none; }
  .nl-input:focus { border-color: var(--accent); }
  .nl-input::placeholder { color: var(--ink-faint); }
  .nl-go { font-family: var(--mono); font-size: 12px; background: var(--panel-2); color: var(--ink); border: 1px solid var(--line-bright); border-radius: 5px; padding: 0 16px; cursor: pointer; flex: 0 0 112px; }
  .nl-go:hover { border-color: var(--accent); color: var(--accent); }
  .nl-go:disabled { opacity: .5; cursor: default; }
  .interp-box { background: var(--bg); border: 1px solid var(--line); border-left: 3px solid var(--blue); border-radius: 5px; padding: 9px 11px; font-size: 12px; color: var(--ink-dim); line-height: 1.5; }
  .interp-box .restate { color: var(--ink); }
  .interp-box .formula { margin-top: 7px; padding-top: 7px; border-top: 1px dashed var(--line); font-family: var(--mono); font-size: 13px; color: var(--amber); white-space: pre-wrap; }
  .coach-box { background: color-mix(in srgb, var(--amber) 10%, var(--panel)); border: 1px solid color-mix(in srgb, var(--amber) 42%, var(--line)); border-left: 3px solid var(--amber); border-radius: 8px; padding: 9px 11px; color: var(--ink); line-height: 1.5; }
  .coach-box .coach-title { font-family: var(--mono); font-size: 11px; color: var(--amber); font-weight: 800; margin-bottom: 5px; }
  .coach-box .coach-msg { font-family: var(--sans); font-size: 12px; }
  .coach-options { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .coach-options button { font-family: var(--mono); font-size: 11px; border: 1px solid var(--line-bright); border-radius: 999px; background: var(--panel-2); color: var(--ink); padding: 5px 9px; cursor: pointer; }
  .coach-options button:hover { border-color: var(--accent); color: var(--accent); }
  .active-ds-bar { display:flex; align-items:center; gap:8px; min-height:30px; padding:5px 7px; border:1px solid var(--line); border-radius:8px; background:color-mix(in srgb, var(--panel-2) 58%, var(--bg)); font-family:var(--mono); font-size:11px; color:var(--ink-dim); }
  .active-ds-bar .active-label { color:var(--ink-dim); }
  .active-ds-chip { display:inline-flex; align-items:center; gap:5px; max-width:170px; color:var(--accent); border:1px solid var(--line-bright); border-radius:999px; padding:2px 6px 2px 8px; background:var(--panel); }
  .active-ds-chip .active-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .active-chip-x { border:0; background:transparent; color:var(--ink-faint); cursor:pointer; font-family:var(--mono); padding:0 2px; line-height:1; }
  .active-chip-x:hover { color:var(--red); }
  .active-clear { margin-left:auto; border:1px solid var(--line-bright); border-radius:999px; background:var(--panel); color:var(--ink-dim); padding:3px 8px; font-family:var(--mono); cursor:pointer; }
  .active-clear:hover { color:var(--red); border-color:var(--red); }
  .ds-item.active-dataset { border-color:var(--accent); box-shadow:0 0 0 2px color-mix(in srgb, var(--accent) 55%, transparent); }
  .repair-note { margin-top:8px; }
  .code-wrap { display: flex; gap: 8px; align-items: stretch; }
  .code-wrap textarea { flex: 1; min-height: 84px; height: 84px; resize: vertical; font-family: var(--mono); font-size: 13px; color: var(--ink); background: var(--bg); border: 1px solid var(--line-bright); border-radius: 5px; padding: 9px 11px; outline: none; line-height: 1.5; white-space: pre; overflow-x: auto; }
  .code-wrap textarea:focus { border-color: var(--accent); }
  .code-btns { display: flex; flex: 0 0 112px; flex-direction: column; gap: 6px; justify-content: stretch; align-self: stretch; }
  .code-btns button { font-family: var(--mono); font-size: 11px; border-radius: 4px; padding: 8px 12px; cursor: pointer; border: 1px solid var(--line-bright); white-space: nowrap; flex: 1; }
  .code-btns .run { background: var(--panel-2); color: var(--ink); }
  .code-btns .run:hover { border-color: var(--accent); color: var(--accent); }
  .code-btns .runblock { background: var(--accent-dim); color: var(--ink); border-color: var(--accent); font-weight: 600; }
  .code-btns .runblock:hover { background: var(--accent); color: var(--bg); }
  .code-btns button:disabled { opacity:.5; cursor:default; }
  .parse-err { color: var(--red); font-family: var(--mono); font-size: 11px; }

  /* Blocks: 1.5cm squares flowing left→right */
  .blocks-scroll { flex: 1; overflow: auto; padding: 10px; }
  .blocks-flow { display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px; }
  .row-break { flex-basis: 100%; height: 0; }
  .rowlabel-inline { flex: 0 0 84px; display: flex; align-items: center; }
  .rowlabel-inline input { width: 100%; font-family: var(--mono); font-size: 10px; background: var(--panel-2); color: var(--ink); border: 1px solid var(--line); border-radius: 4px; padding: 3px 6px; outline: none; }
  .rowlabel-inline input:focus { border-color: var(--accent); }
  .blk { width: 1.5cm; height: 1.5cm; background: var(--panel-2); border: 1px solid var(--line); border-top: 3px solid var(--blue); border-radius: 6px; padding: 4px 5px; cursor: grab; display: flex; flex-direction: column; justify-content: space-between; position: relative; user-select: none; transition: box-shadow .12s, transform .04s; }
  .blk.err { border-top-color: var(--red); }
  .blk.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .blk.selected { border-color: var(--amber); box-shadow: 0 0 0 2px rgba(217,164,91,.55); }
  .blk.dragging { box-shadow: 0 10px 26px rgba(0,0,0,.55); z-index: 40; cursor: grabbing; }
  .blk .top { display: flex; align-items: center; }
  .blk .idx { font-family: var(--mono); font-size: 13px; color: var(--blue); font-weight: 800; line-height: 1; }
  .blk.err .idx { color: var(--red); }
  .blk .st { margin-left: auto; font-size: 10px; font-weight: 700; }
  .blk .st.ok { color: var(--green); } .blk .st.err { color: var(--red); } .blk .st.run { color: var(--amber); }
  .blk .mini { display: none; }
  .blk .btns { display: flex; gap: 2px; }
  .blk .bbtn { flex: 1; font-family: var(--mono); font-size: 9px; background: var(--panel); color: var(--ink-dim); border: 1px solid var(--line); border-radius: 3px; padding: 1px 0; cursor: pointer; text-align: center; }
  .blk .bbtn:hover { color: var(--ink); border-color: var(--accent); }
  .blocks-empty { color: var(--ink-faint); font-family: var(--mono); font-size: 12px; padding: 30px 12px; text-align: center; line-height: 1.8; width: 100%; }
  .select-box { position: fixed; z-index: 75; border: 1px dashed var(--accent); background: rgba(111,140,255,.16); pointer-events: none; }

  /* Result / Log: accumulating panes */
  .stream { flex: 1; min-height: 0; overflow: auto; padding: 9px 13px; font-family: var(--mono); font-size: 12px; line-height: 1.5; }
  .stream .placeholder { color: var(--ink-faint); }
  .entry { border-bottom: 1px dashed var(--line); padding: 7px 0; white-space: pre-wrap; word-break: break-word; }
  .entry:last-child { border-bottom: none; }
  .entry .ehead { font-size: 10px; color: var(--ink-faint); margin-bottom: 3px; }
  .entry.err .ehead { color: var(--red); }
  .entry img { max-width: 100%; border: 1px solid var(--line); border-radius: 4px; margin: 4px 0; background: #fff; }
  .entry .interp { color: var(--green); border-left: 2px solid var(--green); padding-left: 8px; margin-top: 5px; white-space: pre-wrap; }
  table.df { border-collapse: collapse; }
  table.df th, table.df td { border: 1px solid var(--line); padding: 3px 6px; text-align: right; white-space: nowrap; }
  table.df th { background: var(--panel-2); color: var(--ink-dim); position: sticky; top: 0; }
  table.df td { color: var(--ink); }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 80; display: block; }
  .modal { background: var(--panel); border: 1px solid var(--line-bright); border-radius: 8px; width: min(900px,88vw); height: min(640px,78vh); max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%); resize: both; min-width: 420px; min-height: 260px; }
  .modal.full { left: 4vw !important; top: 5vh !important; transform: none !important; width: 92vw !important; height: 88vh !important; max-height: 88vh; resize: none; }
  .modal h3 { font-family: var(--mono); font-size: 13px; padding: 10px 12px 10px 16px; border-bottom: 1px solid var(--line); color: var(--accent); display: flex; gap: 6px; align-items: center; cursor: move; user-select: none; }
  .modal h3 .mtitle { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .modal h3 .x, .modal h3 .max { cursor: pointer; color: var(--ink-faint); border: 1px solid var(--line-bright); border-radius: 3px; padding: 0 8px; background: transparent; font-family: var(--mono); }
  .modal h3 .x:hover, .modal h3 .max:hover { color: var(--ink); border-color: var(--accent); }
  .modal .mbody { overflow: auto; padding: 14px 16px; font-family: var(--mono); font-size: 12px; white-space: pre-wrap; word-break: break-word; line-height: 1.5; flex: 1; }
  .modal .mbody img { max-width: 100%; background:#fff; border-radius:4px; }
  .modal .mfoot { padding: 10px 16px; border-top: 1px solid var(--line); text-align: right; }
  .modal .mfoot button { font-family: var(--mono); font-size: 12px; background: var(--panel-2); color: var(--ink); border: 1px solid var(--line-bright); border-radius: 4px; padding: 6px 16px; cursor: pointer; }

  .ctx { position: fixed; z-index: 90; background: var(--panel); border: 1px solid var(--line-bright); border-radius: 6px; padding: 4px; min-width: 130px; box-shadow: 0 6px 20px rgba(0,0,0,.5); }
  .ctx .item { font-family: var(--mono); font-size: 12px; padding: 7px 11px; border-radius: 4px; cursor: pointer; color: var(--ink); }
  .ctx .item:hover { background: var(--panel-2); }
  .ctx .item.danger:hover { background: #3a2424; color: var(--red); }


  .entry-actions { display: flex; gap: 6px; margin-top: 5px; }
  .entry-actions button { flex: 0 0 auto; min-width: 90px; padding: 3px 10px !important; font-size: 11px !important; }
  .progress-bg { position: fixed; inset: 0; z-index: 160; background: rgba(0,0,0,.42); display: flex; align-items: center; justify-content: center; }
  .progress-card { width: min(440px, 82vw); background: var(--panel); border: 1px solid var(--line-bright); border-radius: 10px; padding: 18px; box-shadow: 0 18px 44px rgba(0,0,0,.55); font-family: var(--mono); }
  .progress-card .ptitle { color: var(--accent); font-size: 13px; margin-bottom: 9px; }
  .progress-card .pmsg { color: var(--ink-dim); font-size: 11px; margin-bottom: 12px; line-height: 1.5; }
  .progress-card .pbar { height: 8px; background: var(--bg); border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
  .progress-card .pbar i { display: block; height: 100%; width: 30%; background: var(--accent); border-radius: 999px; transition: width .25s; }
  .progress-card .pnote { color: var(--ink-faint); font-size: 10px; margin-top: 9px; }
  .ds-item.selected { border-color: var(--amber); box-shadow: 0 0 0 2px rgba(217,164,91,.55); }


  .result-pre {
    white-space: pre-wrap;
    word-break: break-word;
    background: var(--result-card-bg);
    border: 1px solid var(--line-bright);
    border-left: 4px solid var(--accent);
    border-radius: 8px;
    padding: 11px 13px;
    margin-top: 4px;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.55;
    box-shadow: var(--result-card-shadow);
  }
  .entry .ehead::before {
    content: '◆ ';
    color: var(--accent);
  }
  .entry .interp {
    background: rgba(107,191,123,.08);
    border: 1px solid rgba(107,191,123,.22);
    border-left: 4px solid var(--green);
    border-radius: 7px;
    padding: 9px 11px;
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.55;
  }


  .top-tools { display: flex; align-items: center; gap: 5px; }
  .icon-btn {
    height: 22px; min-width: 26px; padding: 0 7px !important;
    display: inline-flex; align-items: center; justify-content: center; gap: 4px;
    border-radius: 999px !important; border: 1px solid var(--line-bright) !important;
    background: linear-gradient(180deg, var(--panel-2), var(--panel)) !important;
    color: var(--ink-dim) !important; cursor: pointer;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 1px 4px rgba(0,0,0,.12);
  }
  .icon-btn:hover { color: var(--accent) !important; border-color: var(--accent) !important; transform: translateY(-1px); }
  .icon-btn.active { color: var(--accent) !important; border-color: var(--accent) !important; background: var(--accent-dim) !important; }

    .nlstat_env <- new.env()
  `);
  try { await webR.evalRVoid(`webr::global_prompt_install()`, { withHandlers: false }); } catch(e) {}
  bootStatus('Ready');
}

async function getSchema() {
  const code = `local({
    nms <- ls(.nlstat_env); parts <- character(0)
    nms <- nms[!grepl("^\\\\.vibestats_result_", nms)]
    jesc <- function(s) { s <- gsub('\\\\\\\\','\\\\\\\\\\\\\\\\', s); s <- gsub('"','\\\\\\\\"', s); s <- gsub('[[:cntrl:]]',' ', s); s }
    rtype <- function(col) {
      if (inherits(col,'Date')) return('date')
      if (inherits(col,'POSIXt')) return('datetime')
      if (is.factor(col)) return('factor')
      if (is.logical(col)) return('logical')
      if (is.numeric(col)) return(if (is.integer(col)) 'int' else 'num')
      'chr'
    }
    sampval <- function(col) {
      v <- col[!is.na(col)]; if (!length(v)) return('')
      v <- utils::head(v, 2)
      if (inherits(col,'Date')) v <- format(v,'%Y-%m-%d')
      else if (inherits(col,'POSIXt')) v <- format(v,'%Y-%m-%d %H:%M:%S')
      else if (is.numeric(col)) v <- format(round(v,4), trim=TRUE, scientific=FALSE)
      else v <- substr(as.character(v),1,18)
      paste(v, collapse='|')
    }
    for (n in nms) { d <- get(n, envir=.nlstat_env)
      if (is.data.frame(d)) {
        cn <- names(d)
        colparts <- character(0)
        for (j in seq_along(cn)) {
          colparts <- c(colparts, sprintf('{"name":"%s","type":"%s","sample":"%s"}',
            jesc(cn[j]), rtype(d[[j]]), jesc(sampval(d[[j]]))))
        }
        cols <- paste0('"', jesc(cn), '"', collapse=",")
        parts <- c(parts, sprintf('"%s":{"columns":[%s],"shape":[%d,%d],"fields":[%s]}',
          jesc(n), cols, nrow(d), ncol(d), paste(colparts, collapse=","))) } }
    paste0("{", paste(parts, collapse=","), "}") })`;
  let schema = {};
  try { schema = JSON.parse(await webR.evalRString(code)); } catch(e) {}
  window._dsCache = schema;
  return schema;
}

// ===== LLM via secure backend proxy =====
// Prompt/config is separated from the UI so the LLM behavior can be maintained independently.
// Prompt caching is still provider-side: the important part is that stable system prompts remain the first messages.
import {
  OPENAI_MODEL, OPENAI_PROXY_URL, PROMPT_VERSION, METHOD_REQUIREMENTS,
  SYSTEM_PROMPT, DETAILS_SYSTEM_PROMPT, DIAGNOSTICS_SYSTEM_PROMPT, REPAIR_SYSTEM_PROMPT, INTERPRET_SYSTEM_PROMPT,
  SEND_SCHEMA_SAMPLES, SHORT_CONTEXT_CHARS, DETAILS_CONTEXT_CHARS, INTERPRET_RESULT_CHARS, MAX_LLM_CHARS
} from './vibestats-prompts.js';

function formatSchema(s, includeSamples=SEND_SCHEMA_SAMPLES) {
  const k = Object.keys(s);
  if (!k.length) return '(none)';
  return k.map(n => {
    const ds = s[n];
    if (ds.fields && ds.fields.length) {
      const cols = ds.fields.map(f => {
        const sample = includeSamples && f.sample ? `(e.g. ${f.sample})` : '';
        return `${f.name}:${f.type}${sample}`;
      }).join(', ');
      return `- ${n} [${ds.shape[0]}x${ds.shape[1]}]: ${cols}`;
    }
    return `- ${n}: columns=${JSON.stringify(ds.columns)}, shape=${JSON.stringify(ds.shape)}`;
  }).join('\n');
}

function formatLastContext(ctx) {
  if (!ctx) return '(none)';
  const result = ((ctx.resultText || '') + '\n' + htmlToText(ctx.resultHtml || '')).toString().trim().slice(0, SHORT_CONTEXT_CHARS);
  return [
    `Previous user/task summary: ${ctx.summary || '(none)'}`,
    `Previous R code:\n${ctx.code || '(none)'}`,
    `Previous formula: ${ctx.formula || '(none)'}`,
    `Previous result excerpt:\n${result || '(no printed result; maybe a plot or dataset was created)'}`,
    `Previous saved/created dataset: ${ctx.savedDataset || ctx.newDataset || '(none)'}`
  ].join('\n\n');
}

function formatSelectedScope(scope, schema) {
  const selected = (scope || []).filter(x => x && schema && schema[x.name]);
  if (!selected.length) return '(none)';
  return selected.map(x => {
    const ds = schema[x.name] || {};
    const allCols = (ds.fields || []).map(f => `${f.name}:${f.type}`).join(', ') || (ds.columns || []).join(', ');
    const vars = (x.vars && x.vars.length) ? x.vars.join(', ') : '(all variables eligible)';
    return `- ${x.name}: selected variables=${vars}; available columns=${allCols}`;
  }).join('\n');
}


function activeDatasetNames(activeDatasets, schema) {
  const arr = Array.isArray(activeDatasets) ? activeDatasets : (activeDatasets ? [activeDatasets] : []);
  return arr.filter(n => n && schema && schema[n]);
}
function getActiveScope(activeDatasets, schema) {
  return activeDatasetNames(activeDatasets, schema).map(name => ({ name, vars: [] }));
}

function lowerText(x) { return String(x || '').toLowerCase(); }
function columnsForDataset(schema, datasetNames) {
  if (!schema) return [];
  const namesArg = Array.isArray(datasetNames) ? datasetNames : (datasetNames ? [datasetNames] : []);
  const valid = namesArg.filter(n => schema[n]);
  if (valid.length) {
    const seen = new Set();
    const out = [];
    valid.forEach(n => (schema[n].columns || []).forEach(c => { if (!seen.has(c)) { seen.add(c); out.push(c); } }));
    return out;
  }
  const names = Object.keys(schema || {});
  if (names.length === 1) return schema[names[0]].columns || [];
  return [];
}
function escapeRegExp(s) { return String(s).replace(new RegExp('[\\^$.*+?()[\]{}|]', 'g'), '\\$&'); }
function namesMentioned(text, candidates) {
  const t = lowerText(text);
  return (candidates || []).filter(c => new RegExp('(^|[^A-Za-z0-9_.])' + escapeRegExp(c).toLowerCase() + '([^A-Za-z0-9_.]|$)').test(t));
}
function likelyWeightColumns(cols) {
  return (cols || []).filter(c => /^(w|wt|weight|weights|freq|frequency|가중치)$/i.test(c));
}
function detectMethodRequirementIssue(text, schema, activeDatasets) {
  const t = String(text || '');
  const datasetNames = Object.keys(schema || {});
  const activeNames = activeDatasetNames(activeDatasets, schema);
  const cols = columnsForDataset(schema, activeNames);
  const mentionedCols = namesMentioned(t, cols);
  const mentionedDatasets = namesMentioned(t, datasetNames);
  if (datasetNames.length > 1 && !activeNames.length && !mentionedDatasets.length) {
    return {
      message:'Which dataset should I use for this analysis? Please select one or more datasets on the left, or specify dataset names in your prompt.',
      options: datasetNames.slice(0,3).map(n => `Use dataset ${n}`),
      summary:'Missing dataset choice'
    };
  }
  for (const rule of METHOD_REQUIREMENTS) {
    if (!rule.pattern.test(t)) continue;
    if (rule.id === 'wls') {
      const wcols = likelyWeightColumns(cols);
      const mentionedWeight = mentionedCols.some(c => /^(w|wt|weight|weights|freq|frequency|가중치)$/i.test(c)) || /weights?\s*=|가중치.*(사용|으로)/i.test(t);
      if (!mentionedWeight) {
        const opts = ['Run ordinary OLS instead'];
        if (wcols[0]) opts.push(`Use ${wcols[0]} as the weight variable`);
        opts.push('I will specify the weight variable');
        return { message:'WLS regression requires a weight variable. Which weight should be used?', options:opts.slice(0,3), summary:'Missing WLS weight variable' };
      }
    } else if (rule.id === 'iv') {
      if (!/(instrument|도구변수|using\s+.+\s+as\s+instrument|as\s+an\s+instrument)/i.test(t)) {
        return { message:'IV/2SLS regression needs an endogenous variable and an instrument variable. Which variable is endogenous, and which variable should be used as the instrument?', options:['I will specify endogenous and instrument variables','Run ordinary OLS instead','Explain IV requirements'], summary:'Missing IV specification' };
      }
    } else if (rule.id === 'panel') {
      const hasId = /(id|firm|company|person|unit|entity|개체|기업|회사)/i.test(t);
      const hasTime = /(time|date|year|month|quarter|period|시점|연도|날짜|월|분기)/i.test(t);
      if (!(hasId && hasTime)) {
        return { message:'Panel models need both a unit/id variable and a time variable. Which columns identify the unit and time?', options:['I will specify id and time variables','Run pooled OLS instead','Explain panel requirements'], summary:'Missing panel id/time variables' };
      }
    } else if (rule.id === 'did') {
      if (!/(treat|treated|control|post|after|before|처치|대조|이후|이전)/i.test(t)) {
        return { message:'Difference-in-differences needs a treatment/group variable and a post/time variable. Which variables define treatment and post period?', options:['I will specify treatment and post variables','Run a simple group comparison instead','Explain DID requirements'], summary:'Missing DID variables' };
      }
    } else if (rule.id === 'survival') {
      if (!/(event|status|death|failure|censor|time|duration|이벤트|사건|생존시간|기간)/i.test(t)) {
        return { message:'Survival analysis needs a time/duration variable and an event indicator. Which columns should be used?', options:['I will specify time and event variables','Run a descriptive summary instead','Explain survival requirements'], summary:'Missing survival time/event variables' };
      }
    }
  }
  return null;
}

function looksLikeFollowUp(text) {
  return /(더\s*(자세|상세|많이|깊게)|자세한|상세한|추가|진단|해석|보고서|좀\s*더|more detailed|more detail|expand|deeper|diagnostic|explain more|full result)/i.test(text || '');
}
function normalizeLLMContent(x) {
  if (typeof x === 'string') return x;
  if (Array.isArray(x)) return x.map(part => {
    if (typeof part === 'string') return part;
    if (part && typeof part.text === 'string') return part.text;
    if (part && typeof part.content === 'string') return part.content;
    return '';
  }).join('');
  if (x && typeof x === 'object') return JSON.stringify(x);
  return String(x ?? '');
}
function extractJsonObjectText(raw) {
  let t = normalizeLLMContent(raw).trim();
  if (!t) throw new Error('Empty LLM response');
  t = t.replace(/^```(?:json)?\s*/i, '').replace(/```$/i, '').trim();
  if (t.startsWith('{') && t.endsWith('}')) return t;
  const first = t.indexOf('{');
  if (first < 0) throw new Error('No JSON object found in LLM response: ' + t.slice(0, 240));
  let depth = 0, inString = false, esc = false;
  for (let i = first; i < t.length; i++) {
    const ch = t[i];
    if (esc) { esc = false; continue; }
    if (ch === '\\') { esc = true; continue; }
    if (ch === '"') { inString = !inString; continue; }
    if (inString) continue;
    if (ch === '{') depth++;
    else if (ch === '}') {
      depth--;
      if (depth === 0) return t.slice(first, i + 1);
    }
  }
  throw new Error('Incomplete JSON object in LLM response: ' + t.slice(0, 240));
}
function parseLLMJson(raw, label='LLM') {
  try { return JSON.parse(extractJsonObjectText(raw)); }
  catch (e) {
    console.warn('[Vibestats] Failed to parse JSON from', label, 'raw response:', raw);
    throw new Error('Please enter the dataset name, variable names, and task instructions in more detail.');
  }
}
async function callLLM(messages, jsonMode) {
  // Client-side guard: cap total payload so a runaway prompt cannot blow up tokens/cost.
  const totalChars = messages.reduce((sum, m) => sum + (m.content ? m.content.length : 0), 0);
  if (totalChars > MAX_LLM_CHARS) {
    messages = messages.map(m => m.role === 'user' && m.content && m.content.length > MAX_LLM_CHARS * 0.75
      ? { ...m, content: m.content.slice(0, Math.floor(MAX_LLM_CHARS * 0.75)) + '\n…(truncated)' }
      : m);
  }
  const body = { model:OPENAI_MODEL, messages };
  if (jsonMode) body.response_format = { type:'json_object' };
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), 60000);
  let resp;
  try {
    resp = await fetch(OPENAI_PROXY_URL, {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body), signal: ctrl.signal
    });
  } finally { clearTimeout(timer); }
  if (!resp.ok) {
    const errText = await resp.text().catch(()=> '');
    if (resp.status === 429) throw new Error('Rate limit reached. Please wait a moment and try again.');
    throw new Error('LLM request failed (' + resp.status + '). ' + errText.slice(0, 200));
  }
  const data = await resp.json();
  const cached = data?.usage?.prompt_tokens_details?.cached_tokens ?? data?.usage?.input_tokens_details?.cached_tokens;
  if (typeof cached === 'number') console.debug('[Vibestats] cached prompt tokens:', cached, 'usage:', data.usage, 'promptVersion:', PROMPT_VERSION);
  const content = data?.choices?.[0]?.message?.content ?? data?.output_text ?? data?.content ?? data?.message ?? '';
  return normalizeLLMContent(content);
}
async function parseNL(text, lastContext=null, selectedScope=[], clarificationContext=null) {
  text = text.trim(); if (!text) throw new Error('Empty input');
  const schema = await getSchema();
  const contextText = formatLastContext(lastContext);
  const selectedText = formatSelectedScope(selectedScope, schema);
  const followHint = looksLikeFollowUp(text) && lastContext
    ? '\nNote: this looks like a follow-up; reuse the previous context and extend it rather than repeating identical code.'
    : '';
  // System message is a FIXED prefix (cacheable). Variable parts go in the user message.
  const userMsg = `Current datasets:
${formatSchema(schema)}

Selected analysis scope:
${selectedText}

Scope rule: if Selected analysis scope is not '(none)', prioritize those datasets. If variables are listed, use only those variables unless the user clearly asks otherwise. If a selected dataset says '(all variables eligible)', all variables in that dataset may be used.

Clarification context:
${clarificationContext ? JSON.stringify(clarificationContext) : '(none)'}

Previous analysis context:
${contextText}${followHint}

User input: ${text}
JSON:`;
  const raw = await callLLM([
    { role:'system', content: SYSTEM_PROMPT },
    { role:'user', content: userMsg }
  ], true);
  const d = parseLLMJson(raw, 'LLM');
  const status = String(d.status || 'ready');
  if (status === 'needs_clarification') {
    return { needsClarification:true, message:String(d.message || 'I need a bit more information before generating code.'), options:Array.isArray(d.options) ? d.options.map(String).slice(0,3) : [], summary:String(d.summary || '') };
  }
  if (!d.code) throw new Error("Missing 'code' field");
  return { code:String(d.code), summary:String(d.summary || text), formula:String(d.formula || '') };
}

async function parseDetailsRequest(entry) {
  const schema = await getSchema();
  const userMsg = `Current datasets:\n${formatSchema(schema)}\n\nPrevious analysis summary:\n${entry?._summary || '(none)'}\n\nPrevious formula:\n${entry?._formula || '(none)'}\n\nPrevious R code:\n${entry?._code || '(none)'}\n\nPrevious visible result excerpt:\n${String((entry?.text || '') + '\n' + htmlToText(entry?.html || '')).slice(0, DETAILS_CONTEXT_CHARS)}\n\nJSON:`;
  const raw = await callLLM([
    { role:'system', content: DETAILS_SYSTEM_PROMPT },
    { role:'user', content: userMsg }
  ], true);
  const d = parseLLMJson(raw, 'details');
  if (!d.code) throw new Error("Details response did not include code.");
  return { code:String(d.code), summary:String(d.summary || 'Detailed follow-up analysis'), formula:String(d.formula || entry?._formula || '') };
}

async function parseDiagnosticsRequest(entry) {
  const schema = await getSchema();
  const userMsg = `Current datasets:
${formatSchema(schema)}

Previous analysis summary:
${entry?._summary || '(none)'}

Previous formula:
${entry?._formula || '(none)'}

Previous R code:
${entry?._code || '(none)'}

Previous visible result excerpt:
${String((entry?.text || '') + '\n' + htmlToText(entry?.html || '')).slice(0, DETAILS_CONTEXT_CHARS)}

JSON:`;
  const raw = await callLLM([
    { role:'system', content: DIAGNOSTICS_SYSTEM_PROMPT },
    { role:'user', content: userMsg }
  ], true);
  const d = parseLLMJson(raw, 'diagnostics');
  if (!d.code) throw new Error("Diagnostics response did not include code.");
  return { code:String(d.code), summary:String(d.summary || 'Focused diagnostic analysis'), formula:String(d.formula || entry?._formula || '') };
}

async function repairRCode(code, summary, errorText, attempt) {
  const schema = await getSchema();
  const userMsg = `Current datasets:\n${formatSchema(schema)}\n\nOriginal task:\n${summary || '(not provided)'}\n\nCurrent R code:\n${code}\n\nError message:\n${errorText}\n\nAttempt number: ${attempt}/5\nJSON:`;
  const raw = await callLLM([
    { role:'system', content: REPAIR_SYSTEM_PROMPT },
    { role:'user', content: userMsg }
  ], true);
  const d = parseLLMJson(raw, 'repair');
  if (!d.code) throw new Error('Repair response did not include code.');
  return { code:String(d.code), summary:String(d.summary || summary || ''), formula:String(d.formula || ''), reason:String(d.reason || '') };
}

async function interpretResult(summary, code, resultText) {
  const userMsg = `분석 목적: ${summary}\nR code:\n${code}\n\n결과:\n${String(resultText || '').slice(0, INTERPRET_RESULT_CHARS)}`;
  return (await callLLM([
    { role:'system', content: INTERPRET_SYSTEM_PROMPT },
    { role:'user', content: userMsg }
  ], false)).trim();
}

async function executeR(code, allowNewDatasets=false) {
  const before = new Set(Object.keys(window._dsCache || {}));
  const rLiteral = JSON.stringify(code);
  const resultKey = '.vibestats_result_' + Date.now() + '_' + Math.floor(Math.random()*100000);
  const wrap = `
.vibestats_run <- function() {
  .env <- .nlstat_env; result <- NULL
  .plotfile <- "/tmp/__vibestats_plot.png"
  if (file.exists(.plotfile)) file.remove(.plotfile)
  grDevices::png(.plotfile, width=720, height=480, res=96)
  .console <- capture.output({
    .eval_out <- withVisible(eval(parse(text=${rLiteral}), envir=.env))
    if (exists("result", envir=.env, inherits=FALSE)) result <- get("result", envir=.env)
    else if (isTRUE(.eval_out$visible)) result <- .eval_out$value
  })
  try(grDevices::dev.off(), silent=TRUE)
  if (exists("result", envir=.env, inherits=FALSE)) { result <- get("result", envir=.env); rm("result", envir=.env) }
  .resultText <- ""; .resultHtml <- ""; .consoleText <- paste(.console, collapse="\\n"); .savedNames <- character(0); .resultKey <- ""
  .next_name <- function(prefix) { n <- prefix; i <- 1L; while (exists(n, envir=.env, inherits=FALSE)) { i <- i + 1L; n <- paste0(prefix, i) }; n }
  .esc_html <- function(x) {
    x <- as.character(x); x[is.na(x)] <- ""
    x <- gsub("&", "&amp;", x, fixed=TRUE)
    x <- gsub("<", "&lt;", x, fixed=TRUE)
    x <- gsub(">", "&gt;", x, fixed=TRUE)
    x <- gsub('"', "&quot;", x, fixed=TRUE)
    x
  }
  .fmt <- function(x) {
    if (inherits(x, "Date")) return(format(x, "%Y-%m-%d"))
    if (inherits(x, "POSIXt")) {
      y <- format(x, "%Y-%m-%d %H:%M:%S", tz="UTC")
      y <- sub(" 00:00:00$", "", y)
      return(y)
    }
    if (is.numeric(x)) {
      fmt1 <- function(v) {
        if (is.na(v)) return("")
        if (!is.finite(v)) return(as.character(v))
        av <- abs(v)
        if (av != 0 && av < 1e-4) return(formatC(v, format="e", digits=2))
        if (av != 0 && av >= 1e6) return(formatC(v, format="e", digits=2))
        if (av >= 100) return(formatC(v, format="f", digits=2))
        formatC(signif(v, 4), format="fg", flag="#")
      }
      return(vapply(x, fmt1, character(1)))
    }
    as.character(x)
  }
  .large_html <- function(d, title="Result") {
    nr <- tryCatch(nrow(as.data.frame(d)), error=function(e) length(d))
    nc <- tryCatch(ncol(as.data.frame(d)), error=function(e) 1L)
    paste0("<section class='notice-card'><b>", .esc_html(title), "</b><br>Large result hidden: ", nr, " rows × ", nc, " columns. Use Pdf if you want to export the visible results.</section>")
  }
  .table_html <- function(d, title="Result") {
    d <- as.data.frame(d, stringsAsFactors=FALSE, check.names=FALSE)
    if (nrow(d) > 100L) return(.large_html(d, title))
    if (ncol(d) == 0L) return("")
    dd <- d
    for (j in seq_along(dd)) dd[[j]] <- .fmt(dd[[j]])
    rn <- rownames(d)
    if (!is.null(rn) && length(rn) == nrow(d) && !identical(rn, as.character(seq_len(nrow(d))))) {
      dd <- data.frame(row=rn, dd, check.names=FALSE)
    }
    th <- paste0("<th>", .esc_html(names(dd)), "</th>", collapse="")
    rows <- character(0)
    if (nrow(dd) > 0L) {
      rows <- vapply(seq_len(nrow(dd)), function(i) {
        vals <- vapply(dd[i, , drop=FALSE], function(z) .esc_html(z[[1]]), character(1))
        paste0("<tr>", paste0("<td>", vals, "</td>", collapse=""), "</tr>")
      }, character(1))
    }
    paste0("<section class='result-card'><div class='result-card-title'>", .esc_html(title), "</div><div class='result-table-wrap'><table class='result-table'><thead><tr>", th, "</tr></thead><tbody>", paste(rows, collapse=""), "</tbody></table></div></section>")
  }
  .scalar_html <- function(x, title="Result") {
    val <- paste(.esc_html(capture.output(print(x))), collapse="<br>")
    paste0("<section class='result-card'><div class='result-card-title'>", .esc_html(title), "</div><div>", val, "</div></section>")
  }
  .obj_html <- function(x, title="Result", depth=0L) {
    if (is.data.frame(x)) return(.table_html(x, title))
    if (is.matrix(x) || is.table(x)) return(.table_html(as.data.frame(x), title))
    if (is.atomic(x) && length(x) > 1L && length(x) <= 100L) return(.table_html(data.frame(value=x, check.names=FALSE), title))
    if (is.atomic(x) && length(x) > 100L) return(.large_html(data.frame(value=as.vector(x), check.names=FALSE), title))
    if (is.list(x) && !inherits(x, "lm") && !inherits(x, "glm") && depth < 2L) {
      nms <- names(x); if (is.null(nms)) nms <- paste0("Item ", seq_along(x)); nms[nms==""] <- paste0("Item ", which(nms==""))
      parts <- character(0)
      for (i in seq_along(x)) parts <- c(parts, .obj_html(x[[i]], nms[i], depth+1L))
      parts <- parts[nzchar(parts)]
      if (length(parts)) return(paste(parts, collapse=""))
    }
    .scalar_html(x, title)
  }
  if (!is.null(result)) {
    .printed <- capture.output(print(result))
    .lineCount <- length(.printed)
    .resultHtml <- .obj_html(result, "Result")
    if (!nzchar(.resultHtml) && .lineCount <= 100L) .resultText <- paste(.printed, collapse="\\n")
  }
  paste0("__RESULT__", .resultText, "__HTML__", .resultHtml, "__CONSOLE__", .consoleText, "__SAVED__", paste(.savedNames, collapse=","), "__RKEY__", .resultKey)
}
.vibestats_out <- tryCatch(.vibestats_run(), error=function(e) paste0("__ERR__", conditionMessage(e)))
.vibestats_out
`;
  const installed = new Set();
  for (let attempt=0; attempt<3; attempt++) {
    let out;
    try { out = await webR.evalRString(wrap); }
    catch(e){ throw new Error('R execution error: ' + (e.message||e)); }
    if (typeof out==='string' && out.startsWith('__ERR__')) {
      const msg = out.slice(7);
      const m = msg.match(/there is no package called\s*['"\u2018\u2019\u201c\u201d`]?\s*([\w.]+)/);
      const pkg = m ? m[1] : null;
      if (pkg && !installed.has(pkg)) {
        try { await webR.installPackages([pkg]); installed.add(pkg); continue; }
        catch(ie){ throw new Error(`R execution error: failed to auto-install package '${pkg}'`); }
      }
      throw new Error('R execution error: ' + msg);
    }
    let resultText = '', resultHtml = '', consoleText = '', savedDataset = '', resultKeyOut = '';
    const ri = out.indexOf('__RESULT__'), hi = out.indexOf('__HTML__'), ci = out.indexOf('__CONSOLE__'), si = out.indexOf('__SAVED__'), ki = out.indexOf('__RKEY__');
    if (ri>=0 && hi>=0 && ci>=0 && si>=0 && ki>=0) {
      resultText = out.slice(ri+10, hi);
      resultHtml = out.slice(hi+8, ci);
      consoleText = out.slice(ci+11, si);
      savedDataset = out.slice(si+9, ki);
      resultKeyOut = out.slice(ki+8);
    }
    let plot = null;
    try { const buf = await webR.FS.readFile('/tmp/__vibestats_plot.png');
      if (buf && buf.length>100) { let bin=''; for(let i=0;i<buf.length;i++) bin+=String.fromCharCode(buf[i]);
        plot='data:image/png;base64,'+btoa(bin); await webR.FS.unlink('/tmp/__vibestats_plot.png').catch(()=>{}); } } catch(e){}
    await getSchema();
    let after = Object.keys(window._dsCache||{});
    let newOnes = after.filter(n=>!before.has(n));
    const savedSet = new Set(String(savedDataset || '').split(',').map(x=>x.trim()).filter(Boolean));
    const removedNewOnes = newOnes.filter(n => !savedSet.has(n));
    if (removedNewOnes.length && !allowNewDatasets) {
      try {
        await webR.evalRVoid(`rm(list=${JSON.stringify(removedNewOnes)}, envir=.nlstat_env)`);
        await getSchema();
      } catch(e) {}
      newOnes = newOnes.filter(n => savedSet.has(n));
    }
    const hasDisplay = !!(resultHtml || (resultText && resultText.trim()) || (consoleText && consoleText.trim()) || plot);
    if (!hasDisplay) {
      resultHtml = '';
      resultText = '';
      if (!consoleText || !consoleText.trim()) consoleText = 'R code ran successfully. No printed result object, console output, or plot was produced.';
    }
    return { resultText, resultHtml, consoleText, plot, savedDataset, resultKey:resultKeyOut, newDataset: newOnes.length?newOnes[newOnes.length-1]:null };
  }
  throw new Error('R execution error: still failing after package install');
}

async function saveStoredResultAsDataset(resultKey, requestedName) {
  const safe = (requestedName || '').trim().replace(/\W+/g, '_').replace(/^_+|_+$/g, '');
  if (!safe) throw new Error('Dataset name is empty.');
  const nm = /^\d/.test(safe) ? 'd_' + safe : safe;
  const code = `local({
    .env <- .nlstat_env
    key <- ${JSON.stringify(resultKey)}; nm <- ${JSON.stringify(nm)}
    if (!exists(key, envir=.env, inherits=FALSE)) stop("Saved result is no longer available.")
    x <- get(key, envir=.env)
    .flatten_list <- function(L) {
      dfs <- Filter(function(e) is.data.frame(e) || is.matrix(e) || is.table(e), L)
      if (length(dfs) >= 1) {
        sizes <- vapply(dfs, function(e) tryCatch(nrow(as.data.frame(e)), error=function(err) 0L), integer(1))
        return(as.data.frame(dfs[[which.max(sizes)]], stringsAsFactors=FALSE, check.names=FALSE))
      }
      scal <- Filter(function(e) is.atomic(e) && length(e) == 1, L)
      if (length(scal)) {
        nmv <- names(scal); if (is.null(nmv)) nmv <- paste0("V", seq_along(scal))
        return(data.frame(metric=nmv, value=unlist(lapply(scal, as.character)), check.names=FALSE, stringsAsFactors=FALSE))
      }
      NULL
    }
    df <- NULL
    if (is.data.frame(x)) df <- x
    else if (is.matrix(x) || is.table(x)) df <- as.data.frame(x)
    else if (is.list(x)) df <- .flatten_list(x)
    if (is.null(df)) {
      if (is.atomic(x)) df <- data.frame(value=as.vector(x), check.names=FALSE)
      else df <- as.data.frame(capture.output(print(x)), stringsAsFactors=FALSE)
    }
    base <- nm; i <- 1L
    while (exists(nm, envir=.env, inherits=FALSE)) { i <- i + 1L; nm <- paste0(base, i) }
    assign(nm, df, envir=.env)
    nm
  })`;
  const finalName = await webR.evalRString(code);
  await getSchema();
  return finalName;
}

async function loadDataFile(name, file) {
  const info = importInfo(file.name);
  if (!info) throw new Error('Unsupported file type: ' + file.name);
  const ext = (file.name.split('.').pop()||'').toLowerCase();
  const path = '/tmp/' + name + '.' + ext;
  if (ext==='csv' || ext==='tsv') {
    await webR.FS.writeFile(path, new TextEncoder().encode(await file.text()));
  } else {
    const buf = new Uint8Array(await file.arrayBuffer());
    await webR.FS.writeFile(path, buf);
  }
  if (info.lib) { try { await webR.installPackages([info.lib]); } catch(e){} }
  const rexpr = info.read(JSON.stringify(path));
  await webR.evalRVoid(`assign(${JSON.stringify(name)}, ${rexpr}, envir=.nlstat_env)`);
  await getSchema();
}

async function previewHTML(name, startRow=1, endRow=10000) {
  startRow = Math.max(1, parseInt(startRow || 1, 10));
  endRow = Math.max(startRow, parseInt(endRow || startRow, 10));
  const code = `local({ d <- get(${JSON.stringify(name)}, envir=.nlstat_env)
    if (is.null(d)) return("")
    nr <- nrow(d); start <- max(1L, min(${startRow}L, nr)); end <- max(start, min(${endRow}L, nr))
    d <- d[start:end, , drop=FALSE]
    esc <- function(x) {
      x <- as.character(x); x[is.na(x)] <- ""
      x <- gsub("&", "&amp;", x, fixed=TRUE)
      x <- gsub("<", "&lt;", x, fixed=TRUE)
      x <- gsub(">", "&gt;", x, fixed=TRUE)
      x
    }
    fmt <- function(x, nm="") {
      if (inherits(x, "Date")) return(format(x, "%Y-%m-%d"))
      if (inherits(x, "POSIXt")) {
        y <- format(x, "%Y-%m-%d %H:%M:%S", tz="UTC")
        y <- sub(" 00:00:00$", "", y)
        return(y)
      }
      if (is.numeric(x)) {
        ux <- unique(stats::na.omit(x))
        if (grepl("date|time|datetime|timestamp", nm, ignore.case=TRUE) && length(ux) > 0 && all(is.finite(ux)) && all(ux >= 946684800) && all(ux <= 4102444800) && all(abs(ux - round(ux)) < .Machine$double.eps^0.5)) {
          y <- format(as.POSIXct(x, origin="1970-01-01", tz="UTC"), "%Y-%m-%d %H:%M:%S", tz="UTC")
          y <- sub(" 00:00:00$", "", y)
          y[is.na(x)] <- ""
          return(y)
        }
      }
      as.character(x)
    }
    dd <- as.data.frame(Map(function(x, nm) fmt(x, nm), d, names(d)), stringsAsFactors=FALSE, check.names=FALSE)
    th <- paste0("<th>", c("row", esc(names(dd))), "</th>", collapse="")
    rows <- character(0)
    if (nrow(dd) > 0) {
      rows <- vapply(seq_len(nrow(dd)), function(i) {
        vals <- c(start + i - 1L, vapply(dd[i, , drop=FALSE], function(z) esc(z[[1]]), character(1)))
        paste0("<tr>", paste0("<td>", vals, "</td>", collapse=""), "</tr>")
      }, character(1))
    }
    paste0("<table class='df'><thead><tr>", th, "</tr></thead><tbody>", paste(rows, collapse=""), "</tbody></table>") })`;
  return await webR.evalRString(code);
}

function parseTSVToGrid(tsv, minRows=12, minCols=5) {
  const lines = String(tsv || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  if (lines.length && lines[lines.length-1] === '') lines.pop();
  let grid = lines.length ? lines.map(line => line.split('\t')) : [];
  const cols = Math.max(minCols, ...grid.map(r => r.length), 1);
  const rows = Math.max(minRows, grid.length || 0);
  while (grid.length < rows) grid.push([]);
  grid = grid.map(r => { const rr = r.slice(); while (rr.length < cols) rr.push(''); return rr; });
  return grid;
}
function makeBlankGrid(rows=12, cols=5) {
  const r = Math.max(2, parseInt(rows || 12, 10));
  const c = Math.max(1, parseInt(cols || 5, 10));
  const grid = [];
  grid.push(Array.from({length:c}, (_,i)=>'V'+(i+1)));
  for (let i=1;i<r;i++) grid.push(Array.from({length:c}, ()=>''));
  return grid;
}
function gridToTSV(grid) {
  const g = (grid || []).map(r => (r || []).map(v => String(v ?? '')));
  return g.map(r => r.join('\t')).join('\n');
}
function updateGridCell(grid, row, col, value) {
  const next = (grid || [[]]).map(r => (r || []).slice());
  while (next.length <= row) next.push([]);
  const cols = Math.max(...next.map(r => r.length), col+1, 1);
  for (const r of next) while (r.length < cols) r.push('');
  next[row][col] = value;
  return next;
}
function pasteIntoGrid(grid, row, col, text) {
  const block = String(text || '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n').map(line => line.split('\t'));
  if (block.length && block[block.length-1].length === 1 && block[block.length-1][0] === '') block.pop();
  let next = (grid || [[]]).map(r => (r || []).slice());
  const needRows = row + block.length;
  const needCols = Math.max(...block.map(r => col + r.length), ...next.map(r => r.length), 1);
  while (next.length < needRows) next.push([]);
  for (const r of next) while (r.length < needCols) r.push('');
  block.forEach((r, i) => r.forEach((v, j) => { next[row+i][col+j] = v; }));
  return next;
}
function addGridRow(grid) {
  const cols = Math.max(...(grid || [[]]).map(r => r.length), 1);
  return [...(grid || []).map(r=>r.slice()), Array.from({length:cols}, ()=>'')];
}
function addGridCol(grid) {
  const g = (grid && grid.length ? grid : makeBlankGrid(2,1)).map(r => r.slice());
  const idx = Math.max(...g.map(r=>r.length), 0) + 1;
  return g.map((r, i) => [...r, i===0 ? 'V'+idx : '']);
}


function analyzeError(msg) {
  const m = msg.replace(/^R execution error:\s*/, '').trim();
  const rules = [
    [/need finite ['"]?xlim|need finite ['"]?ylim/i,
     'The values being plotted are not numeric (character/date/factor) or are all NA/Inf, so axis limits cannot be computed.',
     '• Run str(dataset) to check the column type (must be num/int).\n• If numbers came in as text, convert with as.numeric(col).\n• If it is a date, use as.Date(col).\n• Strip commas/currency symbols before converting.'],
    [/non-stationary AR part/i,
     'The AR coefficients were estimated into a non-stationary region. This is common when fitting AR directly to a price (level) series with a trend.',
     '• For prices, fit AR to log returns: diff(log(x)).\n• Or use a differenced model ARIMA(p,1,0).\n• Try arima(..., method="ML").'],
    [/there is no package called\s*['"\u2018\u2019\u201c\u201d`]?\s*([\w.]+)/i,
     (mm)=>`Package '${mm[1]}' is not installed.`,
     '• It is usually auto-installed. If this repeats, the package may not be built for WebR (browser R).\n• Check its WebAssembly availability on the repo.r-wasm.org dashboard.'],
    [/argument ["']?x["']? is missing|missing, with no default/i,
     'A required argument of the function was not supplied (e.g. gmm needs moment conditions and a data matrix).',
     '• Check the function signature; gmm/ivreg etc. require specific arguments.\n• For a simple mean/relationship, a plain lm() is usually the right tool.'],
    [/object ['"]?([\w.]+)['"]? not found/i,
     (mm)=>`Object (variable/column/dataset) '${mm[1]}' was not found.`,
     '• Check spelling and case of dataset and column names.\n• Use exactly the names shown in the dataset list.\n• Run names(dataset) to see the real column names.'],
    [/undefined columns selected|subscript out of bounds/i,
     'A non-existent column (or out-of-range index) was selected.',
     '• Run names(dataset) and use only those names.'],
    [/contrasts can be applied only to factors with 2 or more levels/i,
     'A categorical predictor in the regression has only one level.',
     '• Check with table(col) that the variable has 2+ distinct values.'],
    [/missing values|NA\/NaN\/Inf|infinite/i,
     'NA/Inf/NaN entered a computation the function cannot handle.',
     '• Remove missing values with na.omit(dataset), or use missing="drop" in regression.\n• Check for log/division producing Inf/NaN.'],
    [/non-numeric argument to (binary operator|mathematical function)/i,
     'A numeric operation received character/factor values.',
     '• Check types with str(dataset) and convert needed columns with as.numeric().'],
    [/could not find function ['"]?([\w.]+)/i,
     (mm)=>`Function '${mm[1]}' was not found; its package is not loaded.`,
     '• Add library(pkg) at the top (e.g. gls needs library(nlme)).'],
  ];
  for (const [re, cause, fix] of rules) {
    const mm = m.match(re);
    if (mm) return { cause: typeof cause==='function'?cause(mm):cause, fix: typeof fix==='function'?fix(mm):fix };
  }
  return { cause:'Unexpected error. See the original message below.',
           fix:'• Open the block ⓘ to inspect the executed R code.\n• Verify dataset/column names and types (str).\n• Try rephrasing the prompt more specifically.' };
}
function buildErrorLog(msg) {

function cleanErrorMessage(msg) {
  return String(msg || '').replace(/^R execution error:\s*/, '').trim();
}
function isDataReferenceError(msg) {
  const m = cleanErrorMessage(msg);
  return /object ['"“”‘’]?[\w.]+['"“”‘’]? not found/i.test(m)
    || /undefined columns selected/i.test(m)
    || /subscript out of bounds/i.test(m)
    || /object of type ['"]closure['"] is not subsettable/i.test(m)
    || /variable lengths differ/i.test(m)
    || /dataset .* not found/i.test(m)
    || /data set .* not found/i.test(m)
    || /unknown column|can't subset columns|select.*column/i.test(m);
}

}

function pdfEscapeText(s) {
  return String(s ?? '')
    .normalize('NFKD')
    .replace(/[^\x09\x0A\x0D\x20-\x7E]/g, '?')
    .replace(/[\\()]/g, '\\$&');
}
function extractEntryTextForPdf(element) {
  const clone = element.cloneNode(true);
  clone.querySelectorAll('.entry-actions, button, script, style').forEach(x => x.remove());
  clone.querySelectorAll('table').forEach(tbl => {
    const rows = Array.from(tbl.querySelectorAll('tr')).map(tr =>
      Array.from(tr.querySelectorAll('th,td')).map(td => td.textContent.trim()).join('    ')
    );
    const pre = document.createElement('pre');
    pre.textContent = rows.join('\n');
    tbl.replaceWith(pre);
  });
  return (clone.innerText || clone.textContent || '').replace(/\n{3,}/g, '\n\n').trim() || 'No visible content.';
}
function wrapPdfLine(line, maxChars=92) {
  const out = [];
  let cur = String(line ?? '').replace(/\t/g, '    ');
  while (cur.length > maxChars) {
    let cut = cur.lastIndexOf(' ', maxChars);
    if (cut < 35) cut = maxChars;
    out.push(cur.slice(0, cut));
    cur = cur.slice(cut).trimStart();
  }
  out.push(cur);
  return out;
}
function buildTextPdfBlob(title, text) {
  const enc = new TextEncoder();
  const parts = [];
  const offsets = [0];
  let len = 0;
  const add = (x) => { const b = typeof x === 'string' ? enc.encode(x) : x; parts.push(b); len += b.length; };
  const obj = (n, body) => { offsets[n] = len; add(`${n} 0 obj\n${body}\nendobj\n`); };
  const pageW = 595.28, pageH = 841.89;
  const marginX = 42, topY = 800, lineH = 13;
  const rawLines = [title || 'Vibestats result', '', ...String(text || '').split(/\r?\n/)];
  const lines = [];
  for (const ln of rawLines) wrapPdfLine(ln).forEach(x => lines.push(x));
  const linesPerPage = Math.max(1, Math.floor((topY - 45) / lineH));
  const pages = [];
  for (let i=0; i<lines.length; i += linesPerPage) pages.push(lines.slice(i, i+linesPerPage));
  add('%PDF-1.4\n');
  obj(1, '<< /Type /Catalog /Pages 2 0 R >>');
  const pageNums = [];
  let objNum = 4;
  const pageObjs = [];
  for (const pageLines of pages) {
    const contentObj = objNum++;
    const pageObj = objNum++;
    pageNums.push(pageObj);
    let y = topY;
    const cmds = ['BT', '/F1 10 Tf', '12 TL'];
    for (const line of pageLines) {
      cmds.push(`1 0 0 1 ${marginX} ${y.toFixed(2)} Tm (${pdfEscapeText(line)}) Tj`);
      y -= lineH;
    }
    cmds.push('ET');
    const stream = cmds.join('\n') + '\n';
    pageObjs.push([contentObj, `<< /Length ${enc.encode(stream).length} >>\nstream\n${stream}endstream`]);
    pageObjs.push([pageObj, `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW} ${pageH}] /Resources << /Font << /F1 3 0 R >> >> /Contents ${contentObj} 0 R >>`]);
  }
  obj(2, `<< /Type /Pages /Kids [${pageNums.map(n=>`${n} 0 R`).join(' ')}] /Count ${pageNums.length} >>`);

async function saveElementAsPdf(element, defaultName='vibestats-result.pdf') {
  // Text-selectable PDF export: use the browser print engine on the CURRENT page.
  // This avoids canvas/image-based PDFs, so tables and text remain selectable in Save as PDF output.
  if (!element) throw new Error('Result card was not found.');
  const old = document.getElementById('printArea');
  if (old) old.remove();
  const clone = element.cloneNode(true);
  clone.querySelectorAll('.entry-actions, button, script, style').forEach(x => x.remove());
  clone.querySelectorAll('details').forEach(d => d.setAttribute('open', 'open'));

  const printArea = document.createElement('div');
  printArea.id = 'printArea';
  printArea.appendChild(clone);
  document.body.appendChild(printArea);

  const oldTitle = document.title;
  document.title = String(defaultName || 'vibestats-result.pdf').replace(/\.pdf$/i, '');

  const cleanup = () => {
    try { printArea.remove(); } catch(e) {}
    document.title = oldTitle;
    window.removeEventListener('afterprint', cleanup);
  };
  window.addEventListener('afterprint', cleanup);

  await new Promise(resolve => setTimeout(resolve, 80));
  try {
    window.focus();
    window.print();
  } catch (e) {
    cleanup();
    throw e;
  }
  // Some browsers do not reliably fire afterprint after Save as PDF/cancel.
  setTimeout(cleanup, 3000);
}

}
function buildImagePdfFromCanvas(canvas, pageW=595.28, pageH=841.89, margin=28) {
  // Slice a tall canvas into page-sized JPEG images, then assemble a multi-page PDF.
  const drawW = pageW - margin*2;
  const pagePxH = Math.floor(canvas.width * (pageH - margin*2) / drawW); // canvas px per PDF page
  const images = [];
  if (canvas.height <= pagePxH) {
    images.push({ dataUrl: canvas.toDataURL('image/jpeg', 0.92), width: canvas.width, height: canvas.height });
  } else {
    for (let y=0; y<canvas.height; y+=pagePxH) {
      const sliceH = Math.min(pagePxH, canvas.height - y);
      const tmp = document.createElement('canvas');
      tmp.width = canvas.width; tmp.height = sliceH;
      const tctx = tmp.getContext('2d');
      tctx.fillStyle = '#ffffff'; tctx.fillRect(0,0,tmp.width,tmp.height);
      tctx.drawImage(canvas, 0, y, canvas.width, sliceH, 0, 0, canvas.width, sliceH);
      images.push({ dataUrl: tmp.toDataURL('image/jpeg', 0.92), width: canvas.width, height: sliceH });
    }
  }
  return buildImagePdf(images, pageW, pageH, margin);
}
function buildImagePdf(images, pageW=595.28, pageH=841.89, margin=28) {
  const enc = new TextEncoder();
  const parts = [];
  const offsets = [0];
  let len = 0;
  const add = (x) => { const b = typeof x === 'string' ? enc.encode(x) : x; parts.push(b); len += b.length; };
  const obj = (n, bodyParts) => { offsets[n] = len; add(`${n} 0 obj\n`); for (const bp of bodyParts) add(bp); add(`\nendobj\n`); };
  function dataUrlBytes(dataUrl) {
    const bin = atob(dataUrl.split(',')[1]);
    const bytes = new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    return bytes;
  }
  add('%PDF-1.4\n%\xFF\xFF\xFF\xFF\n');
  const pageObjs = [];
  let objNum = 3;
  for (const im of images) {
    const imgObj = objNum++;
    const contentObj = objNum++;
    const pageObj = objNum++;
    pageObjs.push(pageObj);
    const jpg = dataUrlBytes(im.dataUrl);
    obj(imgObj, [`<< /Type /XObject /Subtype /Image /Width ${im.width} /Height ${im.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpg.length} >>\nstream\n`, jpg, `\nendstream`]);
    const drawW = pageW - margin*2;
    const drawH = Math.min(pageH - margin*2, drawW * im.height / im.width);
    const x = margin;
    const y = pageH - margin - drawH;
    const stream = `q\n${drawW.toFixed(2)} 0 0 ${drawH.toFixed(2)} ${x.toFixed(2)} ${y.toFixed(2)} cm\n/Im${imgObj} Do\nQ\n`;
    obj(contentObj, [`<< /Length ${enc.encode(stream).length} >>\nstream\n${stream}endstream`]);
    obj(pageObj, [`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageW} ${pageH}] /Resources << /XObject << /Im${imgObj} ${imgObj} 0 R >> >> /Contents ${contentObj} 0 R >>`]);
  }
  obj(1, [`<< /Type /Catalog /Pages 2 0 R >>`]);
  obj(2, [`<< /Type /Pages /Kids [${pageObjs.map(n=>`${n} 0 R`).join(' ')}] /Count ${pageObjs.length} >>`]);
  const startxref = len;
  const maxObj = objNum - 1;
  add(`xref\n0 ${maxObj + 1}\n0000000000 65535 f \n`);
  for (let i=1;i<=maxObj;i++) add(`${String(offsets[i] || 0).padStart(10,'0')} 00000 n \n`);
  add(`trailer\n<< /Size ${maxObj + 1} /Root 1 0 R >>\nstartxref\n${startxref}\n%%EOF`);
  return new Blob(parts, { type:'application/pdf' });
}
function handleCodeKeyDown(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const el = e.currentTarget;
    const start = el.selectionStart, end = el.selectionEnd;
    const v = el.value;
    const next = v.slice(0, start) + '  ' + v.slice(end);
    el.value = next;
    el.selectionStart = el.selectionEnd = start + 2;
    el.dispatchEvent(new Event('input', { bubbles:true }));
  } else if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    const btn = document.querySelector('[data-run-rcode="1"]');
    if (btn) btn.click();
  }
}
function htmlToText(html) {
  if (!html) return '';
  try {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const parts = [];
    doc.querySelectorAll('.result-card').forEach(card => {

    const out = parts.join('\n').trim();
    return out || doc.body.textContent.trim();
  } catch(e) { return ''; }
}

function beginModalDrag(e) {
  if (e.button !== 0 || e.target.closest('.x,.max')) return;
  const modal = e.currentTarget.closest('.modal');
  if (!modal || modal.classList.contains('full')) return;
  e.preventDefault();
  const r = modal.getBoundingClientRect();
  modal.style.left = r.left + 'px';
  modal.style.top = r.top + 'px';
  modal.style.width = r.width + 'px';
  modal.style.height = r.height + 'px';
  modal.style.transform = 'none';
  const dx = e.clientX - r.left, dy = e.clientY - r.top;
  const move = (ev) => {
    modal.style.left = Math.max(0, Math.min(window.innerWidth - 80, ev.clientX - dx)) + 'px';
    modal.style.top = Math.max(0, Math.min(window.innerHeight - 50, ev.clientY - dy)) + 'px';
  };
  const up = () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); };
  document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
}

function useSplitter() {
  return useCallback((e, dir, grow) => {
    e.preventDefault();
    const g = e.currentTarget; g.classList.add('drag');
    const horiz = dir === 'h';
    const target = grow === 'next' ? g.nextElementSibling : g.previousElementSibling;
    const start = horiz ? e.clientX : e.clientY;
    const startSize = horiz ? target.getBoundingClientRect().width : target.getBoundingClientRect().height;
    const move = (ev) => {
      const cur = horiz ? ev.clientX : ev.clientY;
      const delta = cur - start;
      const next = startSize + (grow === 'next' ? -delta : delta);
      target.style.flex = `0 0 ${Math.max(110, next)}px`;
    };
    const up = () => { g.classList.remove('drag'); document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); };
    document.addEventListener('mousemove', move); document.addEventListener('mouseup', up);
  }, []);
}

      const a = await parseNL(text, lastRunContext, getActiveScope(activeDatasets, schema), coach);
      if (a.needsClarification) {

        pushCoachCard(a.message, a.options || [], text, a.summary || '');
      } else {
        setCoach(null); setCodeText(a.code); setRestate(a.summary); setFormula(a.formula||'');
        pushAssistantCard('Analysis plan', a.summary || 'Analysis code was prepared.', a.formula || '');
        if (runAfter) {

          const block = { id, index, summary:rr.summary||a.summary||text.slice(0,40), code:rr.code, formula:rr.formula||a.formula||'', status, label:'', newline:false, userMemo:'' };
          setBlocks(bs => [...bs, block]);

          if (rr.repaired && !rr.res.error) setParseErr('오류가 자동으로 수정되어 정상 실행되었습니다. 수정된 코드가 R Code 창에 반영되었습니다.');

  async function runCodeCore(code, allowNewDatasets=false) {
    return await executeR(code, allowNewDatasets).catch(e => ({ error: e.message||String(e) }));
  }

  async function runCodeWithRepair(initialCode, summary, allowNewDatasets=false) {
    let currentCode = initialCode, currentSummary = summary, currentFormula = formula;
    let res = null;
    for (let attempt=1; attempt<=5; attempt++) {
      showProgress(attempt===1 ? 'Running R code…' : `Repairing and retrying R code (${attempt}/5)…`, Math.min(88, 15 + attempt*14), '오류가 있으면 최대 5회까지 자동으로 코드를 수정해 다시 실행합니다.');
      res = await runCodeCore(currentCode, allowNewDatasets);
      if (!res.error) return { res, code:currentCode, summary:currentSummary, formula:currentFormula, repaired:attempt>1 };
      if (isDataReferenceError(res.error)) {
        const msg = dataReferenceMessage(res.error);
        setParseErr(msg);
        return { res:{ error: msg }, code:currentCode, summary:currentSummary, formula:currentFormula, repaired:false, noRepair:true };
      }
      const msg = cleanErrorMessage(res.error);
      setParseErr(`오류가 발생했습니다. 자동 수정 시도 ${attempt}/5\n${msg}`);
      pushLog({ head:`[${now()}] auto-repair ${attempt}/5`, error:true, text:msg });
      if (attempt===5) break;
      try {
        const beforeCode = currentCode;
        const fixed = await repairRCode(currentCode, currentSummary, res.error, attempt+1);
        currentCode = fixed.code; currentSummary = fixed.summary || currentSummary; currentFormula = fixed.formula || currentFormula;
        setCodeText(currentCode); setRestate(currentSummary); setFormula(currentFormula);
        pushLog({ head:`[${now()}] code repaired ${attempt}/5`, text: `${fixed.reason || 'Code was revised automatically.'}

--- Original code ---
${beforeCode}

--- Repaired code ---
${currentCode}` });
      } catch(repairErr) {
        res = { error: 'Auto-repair failed: ' + (repairErr.message || repairErr) };
        setParseErr(`오류가 발생했고 자동 수정에도 실패했습니다.\n${cleanErrorMessage(res.error)}`);
        break;
      }
    }
    return { res, code:currentCode, summary:currentSummary, formula:currentFormula, repaired:true };
  }

  function dispatchOutput(res, head, code, runFormula=formula, isDetail=false) {
    const ts = `[${now()}] ${head}`;
    if (res.error) {
      pushLog({ head: ts + ' — FAILED', error:true, text: cleanErrorMessage(res.error) });
      return;
    }
    if (res.newDataset && res.newDataset !== res.savedDataset && !String(res.savedDataset || '').split(',').includes(res.newDataset)) {
      markDatasetKind(res.newDataset, 'created');
      pushLog({ head: ts + ' — dataset created', text:`New dataset created: '${res.newDataset}'.` });
    }
    const resultLineCount = res.resultText ? res.resultText.split(/\r?\n/).length : 0;
    let displayed = false;
    if (res.resultHtml || (res.resultText && res.resultText.trim() && resultLineCount <= 100) || res.plot) {
      pushResult({ head: ts, text: res.resultText ? res.resultText.trim() : '', html: res.resultHtml || '', plot: res.plot || null,
                   _code: code, _summary: head, _formula: runFormula || '', _isDetail: !!isDetail, resultKey: res.resultKey || null });
      displayed = true;
    }
    if (!displayed && res.consoleText && res.consoleText.trim()) {
      const ctext = res.consoleText.trim();
      const consoleLines = ctext.split(/\r?\n/).length;
      if (ctext.startsWith('R code ran successfully. No printed result object')) {
        pushLog({ head: ts + ' — completed', text: `R code ran successfully.

Executed code:
${code || '(none)'}` });
        displayed = true;
      } else if (consoleLines <= 100) {
        pushResult({ head: ts + ' — console output', text: ctext, html:'', plot:null,
                     _code: code, _summary: head, _formula: runFormula || '', _isDetail: !!isDetail, resultKey: null });
        displayed = true;
      } else {
        pushLog({ head: ts + ' — console output suppressed', text:'Console output had more than 100 lines, so it was not printed. Assign large outputs to a dataset to inspect them.' });
      }
    } else if (res.consoleText && res.consoleText.trim()) {
      pushLog({ head: ts + ' — technical log', text: res.consoleText.trim() });
    }
    if (!displayed && !res.savedDataset && !(res.consoleText && res.consoleText.trim())) {
      pushLog({ head: ts + ' — completed', text: `R code ran successfully.

Executed code:
${code || '(none)'}` });
    }
    if (!res.error) {
      setLastRunContext({
        summary: head,
        code,
        formula: runFormula || '',
        resultText: res.resultText || '',
        resultHtml: res.resultHtml || '',
        consoleText: res.consoleText || '',
        plot: !!res.plot,
        savedDataset: res.savedDataset || '',
        newDataset: res.newDataset || ''
      });
    }
  }

  async function showPreview(name) {
    const sc=(window._dsCache||{})[name]; const sh=sc?sc.shape:[0,0];
    let start=1, end=Math.min(10000, sh[0] || 10000);
    if (sh[0] > 10000) {
      const ans = prompt(`${name} has ${sh[0]} rows. Enter row range to open (example: 1-10000):`, `1-10000`);
      if (ans === null) return;
      const m = ans.match(/(\d+)\s*[-:,~]\s*(\d+)/);
      if (m) { start = parseInt(m[1],10); end = parseInt(m[2],10); }
      else { const n = parseInt(ans,10); if (Number.isFinite(n)) { start = 1; end = n; } }
      if (end - start + 1 > 10000 && !confirm('More than 10,000 rows may be slow. Continue?')) return;
    }
    let html=''; try{ html=await previewHTML(name,start,end);}catch(e){ html = `<div style="color:var(--red)">${String(e.message||e)}</div>`; }
    setModal({ title:`${name}  (${sh[0]} × ${sh[1]}) rows ${start}-${Math.min(end, sh[0])}`, html, datasetName:name });
  }

  async function onRenameDataset(oldName) {
    const proposed = prompt(`Rename dataset '${oldName}' to:`, oldName);
    if (proposed===null) return;
    let nm = proposed.trim().replace(/\W+/g,'_').replace(/^_+|_+$/g,'');
    if (!nm) { alert('Dataset name cannot be empty.'); return; }
    if (/^\d/.test(nm)) nm = 'd_' + nm;
    try {
      await webR.evalRVoid(`local({ .env <- .nlstat_env; old <- ${JSON.stringify(oldName)}; new <- ${JSON.stringify(nm)}; if (!exists(old, envir=.env, inherits=FALSE)) stop("dataset not found"); if (exists(new, envir=.env, inherits=FALSE)) stop("target name already exists"); assign(new, get(old, envir=.env), envir=.env); rm(list=old, envir=.env) })`);
      await refreshSchema();
      setNewNames(p=>p.map(x=>x===oldName?nm:x));
      setDatasetKinds(k=>{ const next={...k}; if (next[oldName]) { next[nm]=next[oldName]; delete next[oldName]; } return next; });
      setDatasetNotes(k=>{ const next={...k}; if (Object.prototype.hasOwnProperty.call(next, oldName)) { next[nm]=next[oldName]; delete next[oldName]; } return next; });
      setSelectedDatasets(p=>p.map(x=>x===oldName?nm:x));
      setActiveDatasets(p=>p.map(x=>x===oldName?nm:x));
      pushLog({ head:`[${now()}] dataset renamed`, text:`${oldName} → ${nm}` });
    } catch(err) { alert('Rename failed: '+(err.message||err)); }
  }

      const names = await allDatasetNames(); for (const n of names) await deleteDataset(n);

  async function exportRCode() {
    if (!blocks.length) { alert('No blocks to export.'); return; }
    const lines = [];
    lines.push('# Vibestats exported R code');
    lines.push('# Exported: ' + new Date().toISOString());
    lines.push('# Non-code information is written as comments.');
    lines.push('');
    let currentLabel = '';
    blocks.forEach((b, i) => {
      if ((i===0 || b.newline) && b.label) currentLabel = b.label;
      if (i===0 || b.newline) {
        lines.push('');
        lines.push('# ============================================================');
        lines.push('# Label: ' + (currentLabel || '(no label)'));
        lines.push('# ============================================================');
      }
      lines.push('');
      lines.push(`# Block #${b.index}`);
      lines.push('# Prompt: ' + (b.summary || '(none)').replace(/\n/g, '\n#         '));
      lines.push('# Formula: ' + (b.formula || '(none)').replace(/\n/g, '\n#          '));
      lines.push('# Status: ' + (b.status || '(unknown)'));
      if (b.userMemo) lines.push('# User memo: ' + String(b.userMemo).split('\n').join('\n#            '));

              : h('div',{key:7,className:'item danger', onClick:()=>{ if(confirm(`Delete '${ctx.name}'?`)) onDeleteDataset(ctx.name); setCtx(null); }},h('span',{className:'ico'},'×'),'Delete') ]
        : ctx.kind==='dataset-empty'
          ? [ h('div',{key:1,className:'item', onClick:()=>{ newBlankDataset(); setCtx(null); }},h('span',{className:'ico'},'＋'),'New dataset') ]
        : ctx.kind==='datasets-selected'
          ? [ h('div',{key:1,className:'item danger', onClick:()=>{ onDeleteSelectedDatasets(); setCtx(null); }},`Delete ${selectedDatasets.length} datasets`) ]
        : ctx.kind==='blocks-selected'
          ? [ h('div',{key:1,className:'item danger', onClick:()=>{ deleteSelectedBlocks(); setCtx(null); }},`Delete ${selectedIds.length} blocks`) ]
          : [ h('div',{key:1,className:'item danger', onClick:()=>{ if (selectedIds.length > 1 && selectedIds.includes(ctx.id)) deleteSelectedBlocks(); else deleteBlock(ctx.id); setCtx(null); }}, selectedIds.length > 1 && selectedIds.includes(ctx.id) ? `Delete ${selectedIds.length} blocks` : 'Delete block') ])
  );
}
