function SheetEditor({ grid, setGrid, name, setName, help, onSave, saveLabel }) {
  const g = grid && grid.length ? grid : makeBlankGrid(12,5);
  const cols = Math.max(...g.map(r=>r.length), 1);
  const onCellPaste = (e, r, c) => {
    const txt = e.clipboardData && e.clipboardData.getData('text');
    if (txt && (txt.includes('\t') || txt.includes('\n'))) {
      e.preventDefault();
      setGrid(pasteIntoGrid(g, r, c, txt));
    }
  };
  return h('div',{className:'sheet-editor'},
    h('div',{className:'editor-help'}, help || 'Edit cells directly. The first row is used as column names.'),
    h('div',{className:'sheet-toolbar'},
      setName && h('input',{value:name || '', placeholder:'dataset_name', onChange:e=>setName(e.target.value)}),
      h('button',{className:'modal-edit-btn', onClick:()=>setGrid(addGridRow(g))},'+ Row'),
      h('button',{className:'modal-edit-btn', onClick:()=>setGrid(addGridCol(g))},'+ Column'),
      h('button',{className:'modal-edit-btn', onClick:onSave}, saveLabel || 'Save')),
    h('div',{className:'sheet-wrap'},
      h('table',{className:'sheet-table'},
        h('thead',null, h('tr',null,
          h('th',{className:'row-head'},''),
          Array.from({length:cols}, (_,c)=>h('th',{key:c}, String.fromCharCode(65 + (c % 26)) + (c>=26 ? Math.floor(c/26) : ''))))),
        h('tbody',null,
          g.map((row,r)=>h('tr',{key:r},
            h('td',{className:'row-num'}, r+1),
            Array.from({length:cols}, (_,c)=>h('td',{key:c},
              h('input',{value:(row && row[c]) || '', onPaste:e=>onCellPaste(e,r,c), onChange:e=>setGrid(updateGridCell(g,r,c,e.target.value))})))))))))
}

function MenuComp({ label, items, openId, setOpenId, id }) {
  const open = openId === id;
  return h('div', { className:'menu'+(open?' open':''), onMouseEnter:()=>{ if(openId) setOpenId(id); } },
    h('div', { className:'mtitle', onClick:()=> setOpenId(open?null:id) }, label),
    open && h('div', { className:'dropdown' },
      items.map((it,i)=> it.sep ? h('div',{key:i,className:'dsep'})
        : h('div',{key:i,className:'ditem', onClick:()=>{ setOpenId(null); it.onClick(); }}, it.label))));
}

function renderBlocksFlow(blocks, activeId, selectedIds, fns) {
  const out = [];
  blocks.forEach((b, i) => {
    if (b.newline && i!==0) out.push(h('div',{key:'br'+b.id,className:'row-break'}));
    if (i===0 || b.newline) out.push(h('div',{key:'lb'+b.id,className:'rowlabel-inline'},
      h('input',{ placeholder:'label', value:b.label, onChange:e=>fns.setLabel(b.id,e.target.value), onMouseDown:e=>e.stopPropagation() })));
    out.push(blockSquare(b, activeId, selectedIds, fns));
  });
  return out;
}
function blockSquare(b, activeId, selectedIds, fns) {
  const onDown = (e) => {
    if (e.button!==0) return;
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault(); e.stopPropagation();
      fns.setSelectedIds(ids => ids.includes(b.id) ? ids.filter(x=>x!==b.id) : [...ids, b.id]);
      fns.setActiveId(b.id);
      return;
    }
    fns.setSelectedIds([]); fns.setActiveId(b.id);
    const el = e.currentTarget;
    const startX = e.clientX, startY = e.clientY;
    let moved=false, raf=null, curDX=0, curDY=0;
    const apply = () => { el.style.transform = `translate(${curDX}px, ${curDY}px)`; raf=null; };
    const move = (ev) => {
      curDX = ev.clientX-startX; curDY = ev.clientY-startY;
      if (Math.abs(curDX)>4 || Math.abs(curDY)>4) { if(!moved){moved=true; el.classList.add('dragging');} }
      if (moved && !raf) raf = requestAnimationFrame(apply);
    };
    const up = (ev) => {
      document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up);
      if (raf) cancelAnimationFrame(raf);
      el.classList.remove('dragging'); el.style.transform='';
      if (moved) { const dy = ev.clientY-startY; if (dy>28) fns.toggleNewline(b.id,true); else if (dy<-28) fns.toggleNewline(b.id,false); }
    };
    document.addEventListener('mousemove',move); document.addEventListener('mouseup',up);
  };
  return h('div', { key:b.id, 'data-id':b.id, className:'blk '+(b.status==='err'?'err ':'')+(b.id===activeId?'active ':'')+(selectedIds.includes(b.id)?'selected':''),
    title:b.summary, onMouseDown:onDown,
    onContextMenu:e=>{ e.preventDefault(); fns.setCtx({x:e.clientX,y:e.clientY,kind:'block',id:b.id}); } },
    h('div',{className:'top'}, h('span',{className:'idx'},'#'+b.index),
      h('span',{className:'st '+(b.status==='run'?'run':b.status==='ok'?'ok':'err')}, b.status==='run'?'…':b.status==='ok'?'✓':'✗')),
    h('div',{className:'btns'},
      h('div',{className:'bbtn',title:'rerun',onMouseDown:e=>e.stopPropagation(),onClick:()=>fns.rerun(b.id)},'↻'),
      h('div',{className:'bbtn',title:'info',onMouseDown:e=>e.stopPropagation(),onClick:()=>fns.showBlockInfo(b.id)},'ⓘ')));
}

function dsItem(n, info, kind, selected, fns) {
  const clickOpen = (e) => {
    if (e.ctrlKey || e.metaKey) { e.preventDefault(); e.stopPropagation(); fns.setSelectedDatasets(ds=>ds.includes(n)?ds.filter(x=>x!==n):[...ds,n]); return; }
    fns.setSelectedDatasets([]);
    if (fns.toggleActiveDataset) fns.toggleActiveDataset(n);
  };
  const stop = (e) => { e.preventDefault(); e.stopPropagation(); };
  const isActive = (fns.activeDatasets || []).includes(n);
  return h('div', { key:n, 'data-name':n, className:'ds-item kind-'+(kind || 'uploaded')+(selected?' selected':'')+(isActive?' active-dataset':''),
    onClick:clickOpen,
    onDoubleClick:e=>{ e.preventDefault(); e.stopPropagation(); fns.showPreview(n); },
    onContextMenu:e=>{ e.preventDefault(); if (selected) fns.setCtx({x:e.clientX,y:e.clientY,kind:'dataset',name:n}); else { fns.setSelectedDatasets([]); fns.setCtx({x:e.clientX,y:e.clientY,kind:'dataset',name:n}); } } },
    h('div',{className:'nm', title:n}, n),
    h('div',{className:'dim'}, `${info.shape[0]} × ${info.shape[1]}${isActive ? ' · using' : ''}`),
    h('div',{className:'ds-actions'},
      h('button',{className:'ds-ico', title:'Preview', onMouseDown:stop, onClick:e=>{stop(e); fns.showPreview(n);}}, '◉'),
      h('button',{className:'ds-ico note-btn', title:'Memo', onMouseDown:stop, onClick:e=>{stop(e); fns.openDatasetNote(n);}}, (fns.datasetNotes && fns.datasetNotes[n]) ? '📝' : '✎'),
      h('button',{className:'ds-ico', title:'Save CSV', onMouseDown:stop, onClick:e=>{stop(e); fns.onSaveDataset(n);}}, '⇩'),
      h('button',{className:'ds-ico', title:'Delete', onMouseDown:stop, onClick:e=>{stop(e); if(confirm(`Delete '${n}'?`)) fns.onDeleteDataset(n);}}, '×')));
}

  try {
    await bootWebR();
    const boot = document.getElementById('boot');
    boot.style.opacity='0'; setTimeout(()=>boot.remove(), 500);
    createRoot(document.getElementById('root')).render(h(App));
  } catch(e) { bootStatus('Init failed: '+(e.message||e)); console.error(e); }
})();
